<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SONE — مكتبة المعرفة الفلاحية</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Lalezar&amp;family=Tajawal:wght@300;400;500;700;800;900&amp;family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

<style>
  :root{
    --canvas:#0E1712;
    --cream:#FBF7EF;
    --cream-2:#F2ECDB;
    --surface:#FFFFFF;
    --forest:#1F3A2E;
    --forest-2:#28503F;
    --forest-3:#356751;
    --ink:#1C241D;
    --muted:#7C8478;
    --line:#E9E2CF;

    --c-books:#5C7A3D;   --c-books-tint:#EDF3E4;
    --c-articles:#C1683B;--c-articles-tint:#FBEEE5;
    --c-videos:#5B4B8A;  --c-videos-tint:#EFEBF7;
    --c-reports:#B8790A; --c-reports-tint:#FBF1E0;
    --c-trainings:#1F6F63;--c-trainings-tint:#E7F2F0;

    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow-soft:0 10px 30px rgba(31,58,46,.10);
    --shadow-lift:0 18px 40px rgba(20,30,24,.16);
  }

  *,*::before,*::after{box-sizing:border-box; margin:0; padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Tajawal',sans-serif;
    background:var(--canvas);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{width:0;height:0;}
  *:focus-visible{outline:2.5px solid var(--c-reports); outline-offset:2px; border-radius:6px;}
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit;}
  a{color:inherit; text-decoration:none;}
  img{display:block; max-width:100%;}

  /* ================= APP SHELL / PHONE FRAME ================= */
  .app-shell{
    min-height:100dvh;
    display:flex; align-items:center; justify-content:center;
    padding:38px 16px;
    background:
      radial-gradient(70% 55% at 50% 0%, rgba(53,103,81,.35), transparent 60%),
      var(--canvas);
  }
  .phone-frame{
    position:relative;
    width:100%; max-width:412px;
    height:min(890px,92dvh);
    background:linear-gradient(160deg,#0B1210,#1a2621);
    border-radius:46px;
    padding:12px;
    box-shadow:var(--shadow-lift), 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .notch{
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    width:120px; height:22px; background:#0B1210; border-radius:0 0 16px 16px; z-index:40;
  }
  .app-screen{
    position:relative; width:100%; height:100%;
    background:var(--cream);
    border-radius:36px;
    overflow:hidden;
    display:flex; flex-direction:column;
  }

  @media (max-width:480px){
    .app-shell{padding:0;}
    .phone-frame{max-width:100%; height:100dvh; border-radius:0; padding:0; box-shadow:none;}
    .app-screen{border-radius:0;}
    .notch{display:none;}
  }

  /* ================= STATUS BAR ================= */
  .status-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 26px 4px; font-family:'IBM Plex Sans Arabic',sans-serif;
    font-size:13px; font-weight:600; color:var(--forest); flex-shrink:0;
  }
  .status-bar .icons{display:flex; align-items:center; gap:6px;}
  .status-bar svg{width:17px; height:17px;}

  /* ================= APP BAR ================= */
  .app-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 20px 14px; flex-shrink:0;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:42px; height:42px; border-radius:13px;
    background:linear-gradient(150deg,var(--forest-3),var(--forest));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 14px rgba(31,58,46,.35);
  }
  .brand-mark svg{width:22px; height:22px; stroke:#EFE6C8; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round;}
  .brand-text .name{font-family:'Lalezar',sans-serif; font-size:22px; color:var(--forest); line-height:1;}
  .brand-text .tag{font-size:11.5px; color:var(--muted); font-weight:500; margin-top:2px;}
  .bell-btn{
    width:40px; height:40px; border-radius:50%; background:var(--surface);
    display:flex; align-items:center; justify-content:center; position:relative;
    box-shadow:0 3px 10px rgba(31,58,46,.08); border:1px solid var(--line);
    color:var(--forest); transition:transform .15s ease;
  }
  .bell-btn:active{transform:scale(.92);}
  .bell-btn::after{
    content:''; position:absolute; top:9px; left:11px; width:7px; height:7px;
    border-radius:50%; background:var(--c-articles); border:2px solid var(--surface);
  }

  /* ================= SCROLL AREA ================= */
  .app-main{flex:1; overflow-y:auto; padding-bottom:104px; -webkit-overflow-scrolling:touch;}

  /* ================= HERO CARD ================= */
  .hero{
    margin:2px 18px 26px; padding:22px 20px 30px;
    border-radius:var(--radius-lg);
    background:linear-gradient(155deg,var(--forest) 0%,var(--forest-3) 65%,#3d7a5f 100%);
    position:relative; overflow:hidden;
    box-shadow:var(--shadow-soft);
  }
  .hero .veins{position:absolute; inset:0; opacity:.16; pointer-events:none;}
  .hero-eyebrow{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'IBM Plex Sans Arabic',sans-serif; font-size:10.5px; font-weight:700;
    letter-spacing:.14em; color:#D9E8CE; background:rgba(255,255,255,.12);
    padding:5px 11px; border-radius:20px;
  }
  .hero h1{
    font-family:'Lalezar',sans-serif; font-weight:400; font-size:27px; line-height:1.35;
    color:#FBF7EF; margin:14px 0 8px; max-width:230px;
  }
  .hero p{font-size:13px; color:#CFE0C7; line-height:1.6; max-width:250px;}

  .search-pill{
    position:relative; margin:20px -2px -46px; z-index:5;
    display:flex; align-items:center; gap:10px;
    background:var(--surface); border-radius:20px; padding:13px 16px;
    box-shadow:0 14px 30px rgba(20,30,24,.22);
  }
  .search-pill i{color:var(--forest-3); font-size:15px;}
  .search-pill input{
    flex:1; border:none; outline:none; font-family:'Tajawal',sans-serif;
    font-size:14.5px; background:transparent; color:var(--ink);
  }
  .search-pill input::placeholder{color:var(--muted);}
  .clear-btn{display:none; color:var(--muted); font-size:14px;}
  .clear-btn.show{display:block;}

  /* ================= CHIP ROW ================= */
  .chip-row{
    display:flex; gap:10px; overflow-x:auto; padding:56px 18px 4px;
    scroll-snap-type:x proximity;
  }
  .chip{
    flex:0 0 auto; scroll-snap-align:start;
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--line);
    padding:8px 8px 8px 14px; border-radius:26px;
    font-size:12.5px; font-weight:700; color:var(--ink);
    transition:background .18s ease,color .18s ease,border-color .18s ease,transform .15s ease;
  }
  .chip:active{transform:scale(.96);}
  .chip .ic{
    width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .chip .ic svg{width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round;}
  .chip .count{
    font-family:'IBM Plex Sans Arabic',sans-serif; font-size:10.5px; font-weight:600;
    opacity:.7; margin-inline-start:2px;
  }
  .chip.is-active{color:#fff; border-color:transparent;}
  .chip.is-active .count{opacity:.85;}

  /* ================= SECTION HEAD ================= */
  .section-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 18px 12px;
  }
  .section-head .title-wrap{display:flex; align-items:center; gap:10px;}
  .section-head .ic{
    width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  }
  .section-head .ic svg{width:19px; height:19px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round;}
  .section-head h2{font-size:16.5px; font-weight:800; color:var(--ink);}
  .section-head .count-line{
    font-family:'IBM Plex Sans Arabic',sans-serif; font-size:11.5px; color:var(--muted); font-weight:500; margin-top:1px;
  }
  .sort-btn{
    display:flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700;
    color:var(--forest-3); background:var(--surface); border:1px solid var(--line);
    padding:8px 12px; border-radius:16px;
  }
  .sort-btn i{font-size:11px;}

  /* ================= CARD LIST ================= */
  .card-list{padding:0 18px; display:flex; flex-direction:column; gap:12px;}
  .card{
    display:flex; align-items:flex-start; gap:12px;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:12px; text-align:right; transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:active{transform:scale(.985);}
  .thumb{
    flex-shrink:0; width:60px; height:60px; border-radius:14px; overflow:hidden;
    background:var(--cream-2); display:flex; align-items:center; justify-content:center; position:relative;
  }
  .thumb img{width:100%; height:100%; object-fit:cover;}
  .thumb .file-ic{font-size:22px;}
  .thumb .ext-tag{
    position:absolute; bottom:-1px; left:-1px; font-family:'IBM Plex Sans Arabic',sans-serif;
    font-size:8px; font-weight:700; color:#fff; padding:1.5px 5px 2px; border-radius:6px 0 8px 0;
  }
  .card-body{flex:1; min-width:0;}
  .card-body h3{
    font-size:13.8px; font-weight:700; color:var(--ink); line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-meta{
    display:flex; align-items:center; gap:8px; margin-top:8px;
    font-family:'IBM Plex Sans Arabic',sans-serif; font-size:10.8px; color:var(--muted); font-weight:500;
  }
  .card-meta .dot{width:3px; height:3px; border-radius:50%; background:var(--line);}
  .card-actions{display:flex; gap:4px; margin-top:9px;}
  .card-actions button, .card-actions a{
    width:29px; height:29px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    background:var(--cream-2); color:var(--forest-3); font-size:12px; transition:background .15s ease;
  }
  .card-actions .dl:hover, .card-actions .dl:active{background:var(--c-books-tint); color:var(--c-books);}

  /* ================= EMPTY STATE ================= */
  .empty-state{
    text-align:center; padding:52px 30px; color:var(--muted);
  }
  .empty-state .ic{
    width:64px; height:64px; border-radius:20px; margin:0 auto 16px;
    display:flex; align-items:center; justify-content:center;
  }
  .empty-state .ic svg{width:30px; height:30px; fill:none; stroke:currentColor; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round;}
  .empty-state h3{font-size:15px; color:var(--ink); font-weight:800; margin-bottom:6px;}
  .empty-state p{font-size:12.5px; line-height:1.6;}

  /* ================= BOTTOM NAV ================= */
  .bottom-nav{
    position:absolute; inset-inline:0; bottom:0; height:82px;
    background:rgba(255,255,255,.92); backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex; align-items:stretch; justify-content:space-around;
    padding-bottom:14px; z-index:60;
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    color:var(--muted); position:relative;
  }
  .nav-btn svg{width:21px; height:21px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; transition:stroke .18s ease;}
  .nav-btn span{font-size:10px; font-weight:700;}
  .nav-leaf{
    position:absolute; top:2px; width:16px; height:16px; opacity:0; transform:scale(.4);
    transition:opacity .28s ease, transform .28s ease;
  }
  .nav-btn.is-active .nav-leaf{opacity:1; transform:scale(1);}
  @media (prefers-reduced-motion:reduce){
    .nav-leaf, .chip, .card, .sheet, .sheet-backdrop{transition:none !important;}
  }

  /* ================= TOAST ================= */
  .toast{
    position:absolute; bottom:96px; left:50%; transform:translateX(-50%) translateY(12px);
    background:var(--forest); color:#F6F1E2; font-size:12.5px; font-weight:600;
    padding:11px 18px; border-radius:30px; box-shadow:0 12px 26px rgba(20,30,24,.3);
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:120;
    white-space:nowrap; max-width:88%; overflow:hidden; text-overflow:ellipsis;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ================= SHEETS ================= */
  .sheet-backdrop{
    position:absolute; inset:0; background:rgba(14,23,18,.5); opacity:0; pointer-events:none;
    transition:opacity .25s ease; z-index:80;
  }
  .sheet-backdrop.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:absolute; inset-inline:0; bottom:0; height:88%;
    background:var(--cream); border-radius:26px 26px 0 0;
    transform:translateY(100%); transition:transform .32s cubic-bezier(.32,.72,0,1);
    z-index:100; display:flex; flex-direction:column; box-shadow:0 -10px 40px rgba(20,30,24,.25);
  }
  .sheet.show{transform:translateY(0);}
  .sheet-grip{width:38px; height:4px; background:var(--line); border-radius:4px; margin:10px auto 4px;}
  .sheet-head{
    display:flex; align-items:center; gap:10px; padding:10px 16px 14px; border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .sheet-head .back{
    width:34px; height:34px; border-radius:50%; background:var(--surface); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--forest);
  }
  .sheet-head h4{flex:1; font-size:13.5px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .sheet-head .actions{display:flex; gap:6px;}
  .sheet-head .actions a{
    width:34px; height:34px; border-radius:50%; background:var(--forest); color:#F3EEDD;
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .sheet-body{flex:1; overflow:hidden; position:relative; background:#EFE9D8;}
  .sheet-body iframe{width:100%; height:100%; border:none;}
  .sheet-fallback{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:30px; text-align:center; color:var(--muted);
  }
  .sheet-fallback i{font-size:44px; color:var(--forest-3);}
  .sheet-fallback .btn{
    background:var(--forest); color:#F3EEDD; padding:11px 22px; border-radius:24px; font-weight:700; font-size:13px;
  }
  .sheet-loading{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:var(--muted); font-size:12.5px; background:#EFE9D8;
  }
  .sheet-loading i{font-size:26px; color:var(--forest-3); animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="app-shell">
  <div class="phone-frame">
    <div class="notch"></div>
    <div class="app-screen">

      <div class="status-bar">
        <span>٩:٤١</span>
        <div class="icons">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 8.5a15 15 0 0 1 20 0M5.5 12a10 10 0 0 1 13 0M9 15.5a5 5 0 0 1 6 0M12 19h.01"></path></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="8" width="18" height="8" rx="2.5"></rect><path d="M22 10.5v3" stroke-linecap="round"></path><rect x="4" y="10" width="12" height="4" rx="1" fill="currentColor" stroke="none"></rect></svg>
        </div>
      </div>

      <header class="app-bar">
        <div class="brand">
          <div class="brand-mark">
            <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-7-10.5A5.5 5.5 0 0 1 12 5a5.5 5.5 0 0 1 7 5.5C19 16.65 12 21 12 21Z"></path><path d="M12 21V9"></path></svg>
          </div>
          <div class="brand-text">
            <div class="name">SONE</div>
            <div class="tag">مكتبة المعرفة الفلاحية</div>
          </div>
        </div>
        <button class="bell-btn" onclick="showToast('لا توجد إشعارات جديدة الآن','info')" aria-label="الإشعارات">
          <i class="fa-regular fa-bell"></i>
        </button>
      </header>

      <main class="app-main" id="appMain">

        <section class="hero">
          <svg class="veins" viewBox="0 0 300 160" preserveAspectRatio="none">
            <path d="M-10 140 C 60 120, 90 150, 160 110 S 260 60, 320 70" stroke="#F6F1E2" stroke-width="2" fill="none"></path>
            <path d="M40 170 C 90 130, 120 160, 190 130 S 280 90, 330 100" stroke="#F6F1E2" stroke-width="1.4" fill="none"></path>
          </svg>
          <span class="hero-eyebrow">SONE LIBRARY</span>
          <h1>المعرفة الفلاحية بين إيديك</h1>
          <p>تقارير، عروض تدريبية ودروس من واقع الميدان، جاهزة تقرأها أو تحمّلها في أي وقت.</p>
          <div class="search-pill">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="دوّر على تقرير، درس أو موضوع…" autocomplete="off">
            <button class="clear-btn" id="clearSearchBtn" onclick="clearSearch()" aria-label="مسح البحث"><i class="fa-solid fa-circle-xmark"></i></button>
          </div>
        </section>

        <nav class="chip-row" id="chipRow"><button class="chip is-active" style="background: var(--c-books); color: rgb(255, 255, 255);"><span class="ic" style="background:rgba(255,255,255,.22);color:#fff"><svg viewBox="0 0 24 24"><path d="M12 6.7S10 4.3 5.6 4.3C4.7 4.3 4 5 4 5.9V17c0 .9.7 1.6 1.6 1.6 3.1 0 5.1 1.5 6.4 2.9"></path><path d="M12 6.7S14 4.3 18.4 4.3c.9 0 1.6.7 1.6 1.6V17c0 .9-.7 1.6-1.6 1.6-3.1 0-5.1 1.5-6.4 2.9"></path></svg></span>الكتب<span class="count">١</span></button><button class="chip"><span class="ic" style="background:var(--c-articles-tint);color:#C1683B"><svg viewBox="0 0 24 24"><rect x="4.5" y="4" width="15" height="16" rx="2.2"></rect><path d="M8 9h8M8 12.4h8M8 15.8h5"></path></svg></span>المقالات<span class="count">٠</span></button><button class="chip"><span class="ic" style="background:var(--c-videos-tint);color:#5B4B8A"><svg viewBox="0 0 24 24"><rect x="3.3" y="6.3" width="12.5" height="11.4" rx="2.3"></rect><path d="M15.8 10.3 20.7 8v8l-4.9-2.4Z"></path></svg></span>الفيديوهات<span class="count">٠</span></button><button class="chip"><span class="ic" style="background:var(--c-reports-tint);color:#B8790A"><svg viewBox="0 0 24 24"><path d="M5 20V10.5M11 20V4M17 20v-6.5"></path><path d="M3.5 20h17"></path></svg></span>التقارير<span class="count">٠</span></button><button class="chip"><span class="ic" style="background:var(--c-trainings-tint);color:#1F6F63"><svg viewBox="0 0 24 24"><path d="M12 5 2.3 9.5 12 14l9.7-4.5L12 5Z"></path><path d="M6.2 11.7v4.2c0 1.6 2.6 2.9 5.8 2.9s5.8-1.3 5.8-2.9v-4.2"></path><path d="M21.7 9.5V15"></path></svg></span>عروض التدريب<span class="count">٣٤</span></button></nav>

        <section class="content-section">
          <div class="section-head">
            <div class="title-wrap">
              <div class="ic" id="sectionIcon" style="background: var(--c-books-tint); color: rgb(92, 122, 61);"><svg viewBox="0 0 24 24"><path d="M12 6.7S10 4.3 5.6 4.3C4.7 4.3 4 5 4 5.9V17c0 .9.7 1.6 1.6 1.6 3.1 0 5.1 1.5 6.4 2.9"></path><path d="M12 6.7S14 4.3 18.4 4.3c.9 0 1.6.7 1.6 1.6V17c0 .9-.7 1.6-1.6 1.6-3.1 0-5.1 1.5-6.4 2.9"></path></svg></div>
              <div>
                <h2 id="sectionTitle">الكتب</h2>
                <div class="count-line" id="sectionCount">١ ملف</div>
              </div>
            </div>
            <button class="sort-btn" id="sortBtn" onclick="toggleSort()">
              <i class="fa-solid fa-arrow-down-wide-short"></i>
              <span id="sortLabel">الأحدث</span>
            </button>

      <nav class="bottom-nav" id="bottomNav"><button class="nav-btn is-active" style="color: rgb(92, 122, 61);"><span class="nav-leaf"><svg viewBox="0 0 16 16"><path d="M8 14.5S2.5 11 2.5 6.2A4 4 0 0 1 8 2.5a4 4 0 0 1 5.5 3.7C13.5 11 8 14.5 8 14.5Z" fill="#5C7A3D"></path></svg></span><svg viewBox="0 0 24 24"><path d="M12 6.7S10 4.3 5.6 4.3C4.7 4.3 4 5 4 5.9V17c0 .9.7 1.6 1.6 1.6 3.1 0 5.1 1.5 6.4 2.9"></path><path d="M12 6.7S14 4.3 18.4 4.3c.9 0 1.6.7 1.6 1.6V17c0 .9-.7 1.6-1.6 1.6-3.1 0-5.1 1.5-6.4 2.9"></path></svg><span>كتب</span></button><button class="nav-btn"><span class="nav-leaf"><svg viewBox="0 0 16 16"><path d="M8 14.5S2.5 11 2.5 6.2A4 4 0 0 1 8 2.5a4 4 0 0 1 5.5 3.7C13.5 11 8 14.5 8 14.5Z" fill="#C1683B"></path></svg></span><svg viewBox="0 0 24 24"><rect x="4.5" y="4" width="15" height="16" rx="2.2"></rect><path d="M8 9h8M8 12.4h8M8 15.8h5"></path></svg><span>مقالات</span></button><button class="nav-btn"><span class="nav-leaf"><svg viewBox="0 0 16 16"><path d="M8 14.5S2.5 11 2.5 6.2A4 4 0 0 1 8 2.5a4 4 0 0 1 5.5 3.7C13.5 11 8 14.5 8 14.5Z" fill="#5B4B8A"></path></svg></span><svg viewBox="0 0 24 24"><rect x="3.3" y="6.3" width="12.5" height="11.4" rx="2.3"></rect><path d="M15.8 10.3 20.7 8v8l-4.9-2.4Z"></path></svg><span>فيديو</span></button><button class="nav-btn"><span class="nav-leaf"><svg viewBox="0 0 16 16"><path d="M8 14.5S2.5 11 2.5 6.2A4 4 0 0 1 8 2.5a4 4 0 0 1 5.5 3.7C13.5 11 8 14.5 8 14.5Z" fill="#B8790A"></path></svg></span><svg viewBox="0 0 24 24"><path d="M5 20V10.5M11 20V4M17 20v-6.5"></path><path d="M3.5 20h17"></path></svg><span>تقارير</span></button><button class="nav-btn"><span class="nav-leaf"><svg viewBox="0 0 16 16"><path d="M8 14.5S2.5 11 2.5 6.2A4 4 0 0 1 8 2.5a4 4 0 0 1 5.5 3.7C13.5 11 8 14.5 8 14.5Z" fill="#1F6F63"></path></svg></span><svg viewBox="0 0 24 24"><path d="M12 5 2.3 9.5 12 14l9.7-4.5L12 5Z"></path><path d="M6.2 11.7v4.2c0 1.6 2.6 2.9 5.8 2.9s5.8-1.3 5.8-2.9v-4.2"></path><path d="M21.7 9.5V15"></path></svg><span>تدريب</span></button></nav>

      <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
      <div class="sheet" id="previewSheet">
        <div class="sheet-grip"></div>
        <div class="sheet-head">
          <button class="back" onclick="closeSheet()" aria-label="رجوع"><i class="fa-solid fa-arrow-right"></i></button>
          <h4 id="sheetTitle">عنوان الملف</h4>
          <div class="actions">
            <a href="#" id="sheetOpenLink" target="_blank" aria-label="فتح في تبويب جديد"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
            <a href="#" id="sheetDownloadLink" aria-label="تحميل"><i class="fa-solid fa-download"></i></a>
          </div>
        </div>
        <div class="sheet-body" id="sheetBody"></div>
      </div>

      <div class="toast" id="toast"></div>

    </div>
  </div>
</div>

<script>
/* ============ CATEGORY CONFIG ============ */
const ORDER = ['books','articles','videos','reports','trainings'];
const CATS = {
  books:{type:'book', label:'الكتب', navLabel:'كتب', color:'var(--c-books)', hex:'#5C7A3D', tint:'var(--c-books-tint)',
    icon:'<path d="M12 6.7S10 4.3 5.6 4.3C4.7 4.3 4 5 4 5.9V17c0 .9.7 1.6 1.6 1.6 3.1 0 5.1 1.5 6.4 2.9"/><path d="M12 6.7S14 4.3 18.4 4.3c.9 0 1.6.7 1.6 1.6V17c0 .9-.7 1.6-1.6 1.6-3.1 0-5.1 1.5-6.4 2.9"/>',
    emptyTitle:'لا توجد كتب متاحة بعد', emptySub:'سيتم إضافة عناوين جديدة قريباً إلى هذا القسم.'},
  articles:{type:'article', label:'المقالات', navLabel:'مقالات', color:'var(--c-articles)', hex:'#C1683B', tint:'var(--c-articles-tint)',
    icon:'<rect x="4.5" y="4" width="15" height="16" rx="2.2"/><path d="M8 9h8M8 12.4h8M8 15.8h5"/>',
    emptyTitle:'لا توجد مقالات بعد', emptySub:'راقب هذا القسم، المقالات تتجدد باستمرار.'},
  videos:{type:'video', label:'الفيديوهات', navLabel:'فيديو', color:'var(--c-videos)', hex:'#5B4B8A', tint:'var(--c-videos-tint)',
    icon:'<rect x="3.3" y="6.3" width="12.5" height="11.4" rx="2.3"/><path d="M15.8 10.3 20.7 8v8l-4.9-2.4Z"/>',
    emptyTitle:'لا توجد فيديوهات بعد', emptySub:'دروس مصوّرة من الميدان في الطريق إليك.'},
  reports:{type:'report', label:'التقارير', navLabel:'تقارير', color:'var(--c-reports)', hex:'#B8790A', tint:'var(--c-reports-tint)',
    icon:'<path d="M5 20V10.5M11 20V4M17 20v-6.5"/><path d="M3.5 20h17"/>',
    emptyTitle:'لا توجد تقارير بعد', emptySub:'التقارير الميدانية تُنشر هنا أولاً بأول.'},
  trainings:{type:'training', label:'عروض التدريب', navLabel:'تدريب', color:'var(--c-trainings)', hex:'#1F6F63', tint:'var(--c-trainings-tint)',
    icon:'<path d="M12 5 2.3 9.5 12 14l9.7-4.5L12 5Z"/><path d="M6.2 11.7v4.2c0 1.6 2.6 2.9 5.8 2.9s5.8-1.3 5.8-2.9v-4.2"/><path d="M21.7 9.5V15"/>',
    emptyTitle:'لا توجد عروض تدريب بعد', emptySub:'تقارير التربصات والعروض التقديمية تظهر هنا.'}
};
const EXT_COLOR = {pdf:'#C1432E', doc:'#2b579a', docx:'#2b579a', ppt:'#d24726', pptx:'#d24726'};
const AR_DIGITS = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
const toAr = n => String(n).replace(/[0-9]/g, d => AR_DIGITS[d]);

/* ============ SUPABASE ============ */
const SUPABASE_URL = 'https://zpjuhprlcaigmczhqlye.supabase.co';
const DATA_API_KEY = 'sb_publishable_PVQ61DBLGYjzaXy-XFrWpA_k_94iEvK';
const headers = { apikey: DATA_API_KEY, Authorization: `Bearer ${DATA_API_KEY}`, 'Content-Type': 'application/json' };

async function fetchLibraryItems(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/library_items?select=*&order=id.desc`, { headers });
    if(!res.ok) throw new Error(res.status);
    return await res.json();
  }catch(e){
    console.error('fetch failed', e);
    showToast('تعذّر تحميل المحتوى، تحقق من الاتصال','error');
    return [];
  }
}

/* ============ STATE ============ */
const state = { data:[], active:'trainings', query:'', sortDesc:true, renderedIds:new Set() };
const pdfThumbCache = new Map();
const imgObserver = new IntersectionObserver(es=>{
  es.forEach(e=>{ if(e.isIntersecting){ const img=e.target; if(img.dataset.src){img.src=img.dataset.src; img.removeAttribute('data-src');} imgObserver.unobserve(img); } });
},{rootMargin:'120px'});

async function generatePdfThumbnail(url, maxW=140){
  if(pdfThumbCache.has(url)) return pdfThumbCache.get(url);
  try{
    const pdf = await pdfjsLib.getDocument(url).promise;
    const page = await pdf.getPage(1);
    const vp = page.getViewport({scale:1});
    const scale = maxW/vp.width;
    const svp = page.getViewport({scale});
    const canvas = document.createElement('canvas');
    canvas.width = svp.width; canvas.height = svp.height;
    await page.render({canvasContext:canvas.getContext('2d'), viewport:svp}).promise;
    const data = canvas.toDataURL('image/jpeg',.85);
    pdfThumbCache.set(url,data);
    return data;
  }catch(e){ return null; }
}

/* ============ RENDER: NAV + CHIPS ============ */
function countFor(type){ return state.data.filter(i=>i.type===type).length; }

function buildIconSVG(cat){
  return `<svg viewBox="0 0 24 24">${cat.icon}</svg>`;
}
function buildLeafSVG(hex){
  return `<svg viewBox="0 0 16 16"><path d="M8 14.5S2.5 11 2.5 6.2A4 4 0 0 1 8 2.5a4 4 0 0 1 5.5 3.7C13.5 11 8 14.5 8 14.5Z" fill="${hex}"/></svg>`;
}

function renderChipsAndNav(){
  const chipRow = document.getElementById('chipRow');
  const nav = document.getElementById('bottomNav');
  chipRow.innerHTML = ''; nav.innerHTML = '';
  ORDER.forEach(key=>{
    const cat = CATS[key]; const n = countFor(cat.type); const active = key===state.active;
    const chip = document.createElement('button');
    chip.className = 'chip' + (active?' is-active':'');
    chip.style.background = active ? cat.color : '';
    if(active) chip.style.color = '#fff';
    chip.innerHTML = `<span class="ic" style="background:${active?'rgba(255,255,255,.22)':cat.tint};color:${active?'#fff':cat.hex}">${buildIconSVG(cat)}</span>${cat.label}<span class="count">${toAr(n)}</span>`;
    chip.onclick = ()=> setActive(key);
    chipRow.appendChild(chip);

    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (active?' is-active':'');
    if(active) btn.style.color = cat.hex;
    btn.innerHTML = `<span class="nav-leaf">${buildLeafSVG(cat.hex)}</span><svg viewBox="0 0 24 24">${cat.icon}</svg><span>${cat.navLabel}</span>`;
    btn.onclick = ()=> setActive(key);
    nav.appendChild(btn);
  });
}

/* ============ RENDER: SECTION + LIST ============ */
function setActive(key){
  state.active = key; state.renderedIds.clear();
  renderChipsAndNav();
  renderSection();
  document.getElementById('appMain').scrollTo({top:0,behavior:'smooth'});
}

function toggleSort(){
  state.sortDesc = !state.sortDesc;
  document.getElementById('sortLabel').textContent = state.sortDesc ? 'الأحدث' : 'الأقدم';
  renderSection();
}

function getFiltered(){
  const cat = CATS[state.active];
  let items = state.data.filter(i=>i.type===cat.type);
  if(state.query){
    const q = state.query.toLowerCase();
    items = items.filter(i=> i.title && i.title.toLowerCase().includes(q));
  }
  items = [...items].sort((a,b)=>{
    const da = a.date ? new Date(a.date).getTime() : (a.id||0);
    const db = b.date ? new Date(b.date).getTime() : (b.id||0);
    return state.sortDesc ? db-da : da-db;
  });
  return items;
}

function renderSection(){
  const cat = CATS[state.active];
  document.getElementById('sectionIcon').style.background = cat.tint;
  document.getElementById('sectionIcon').style.color = cat.hex;
  document.getElementById('sectionIcon').innerHTML = buildIconSVG(cat);
  document.getElementById('sectionTitle').textContent = cat.label;

  const items = getFiltered();
  document.getElementById('sectionCount').textContent = `${toAr(items.length)} ملف`;

  const list = document.getElementById('cardList');
  list.innerHTML = '';

  if(!items.length){
    list.innerHTML = `<div class="empty-state">
      <div class="ic" style="background:${cat.tint};color:${cat.hex}">${buildIconSVG(cat)}</div>
      <h3>${state.query ? 'ما لقيناش نتائج' : cat.emptyTitle}</h3>
      <p>${state.query ? 'جرّب كلمات بحث مختلفة.' : cat.emptySub}</p>
    </div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  items.forEach(item=> frag.appendChild(buildCard(item, cat)));
  list.appendChild(frag);
  list.querySelectorAll('img[data-src]').forEach(img=>imgObserver.observe(img));

  // lazy pdf thumbnails
  items.forEach(item=>{
    const fileUrl = item.file_url || item.pdfurl;
    const ext = (item.title||'').split('.').pop().toLowerCase();
    if(ext==='pdf' && !item.thumb){
      const target = document.getElementById(`thumb-${item.id}`);
      if(!target) return;
      const run = ()=> generatePdfThumbnail(fileUrl,140).then(data=>{
        if(data && document.body.contains(target)){
          target.innerHTML = `<img src="${data}" alt="">`;
        }
      });
      (window.requestIdleCallback || setTimeout)(run,{timeout:600});
    }
  });
}

function buildCard(item, cat){
  const filename = item.title || 'ملف بدون اسم';
  const ext = filename.split('.').pop().toLowerCase();
  const fileUrl = item.file_url || item.pdfurl || '#';
  const dateStr = item.date ? new Date(item.date).toLocaleDateString('ar-EG') : '';
  const extColor = EXT_COLOR[ext] || '#7C8478';
  const fileIconClass = ext==='pdf' ? 'fa-file-pdf' : (ext==='doc'||ext==='docx') ? 'fa-file-word' : (ext==='ppt'||ext==='pptx') ? 'fa-file-powerpoint' : 'fa-file';

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id = item.id;

  let thumbHTML;
  if(item.thumb){
    thumbHTML = `<img data-src="${item.thumb}" alt="">`;
  }else if(ext==='pdf'){
    thumbHTML = `<i class="fa-solid ${fileIconClass} file-ic" style="color:${extColor}"></i>`;
  }else{
    thumbHTML = `<i class="fa-solid ${fileIconClass} file-ic" style="color:${extColor}"></i>`;
  }

  el.innerHTML = `
    <div class="thumb" id="thumb-${item.id}">${thumbHTML}<span class="ext-tag" style="background:${extColor}">${ext.toUpperCase()}</span></div>
    <div class="card-body">
      <h3>${filename}</h3>
      <div class="card-meta">
        <span>${dateStr}</span>
        ${dateStr ? '<span class="dot"></span>' : ''}
        <span style="color:${cat.hex};font-weight:700">${cat.label}</span>
      </div>
      <div class="card-actions">
        <button class="pv" title="معاينة"><i class="fa-regular fa-eye"></i></button>
        <a class="op" href="${fileUrl}" target="_blank" title="فتح" onclick="event.stopPropagation()"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>
        <a class="dl" href="${fileUrl}" download="${filename}" title="تحميل" onclick="event.stopPropagation()"><i class="fa-solid fa-download"></i></a>
      </div>
    </div>`;

  el.addEventListener('click', ()=> openPreview(item.id));
  return el;
}

/* ============ PREVIEW SHEET ============ */
function openPreview(id){
  const item = state.data.find(i=>i.id===id);
  if(!item) return;
  const filename = item.title || 'ملف بدون اسم';
  const fileUrl = item.file_url || item.pdfurl || '#';
  const ext = filename.split('.').pop().toLowerCase();
  const isPdf = ext==='pdf';
  const isOffice = ['doc','docx','ppt','pptx'].includes(ext);

  document.getElementById('sheetTitle').textContent = filename;
  document.getElementById('sheetOpenLink').href = fileUrl;
  const dl = document.getElementById('sheetDownloadLink');
  dl.href = fileUrl; dl.setAttribute('download', filename);

  const body = document.getElementById('sheetBody');
  if(isPdf || isOffice){
    body.innerHTML = `<div class="sheet-loading"><i class="fa-solid fa-spinner"></i><span>جاري تحميل المعاينة…</span></div>`;
    const viewerUrl = isPdf ? fileUrl : `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(fileUrl)}`;
    const iframe = document.createElement('iframe');
    iframe.src = viewerUrl; iframe.loading = 'lazy';
    iframe.onload = ()=> body.innerHTML = '';
    body.appendChild(iframe);
  }else{
    body.innerHTML = `<div class="sheet-fallback">
      <i class="fa-solid fa-file"></i>
      <div><strong>لا تتوفر معاينة لهذا النوع من الملفات</strong><p style="margin-top:6px;font-size:12px;">يمكنك تحميل الملف لفتحه على جهازك.</p></div>
      <a class="btn" href="${fileUrl}" download="${filename}"><i class="fa-solid fa-download"></i>&nbsp; تحميل الملف</a>
    </div>`;
  }

  document.getElementById('previewSheet').classList.add('show');
  document.getElementById('sheetBackdrop').classList.add('show');
}
function closeSheet(){
  document.getElementById('previewSheet').classList.remove('show');
  document.getElementById('sheetBackdrop').classList.remove('show');
  setTimeout(()=>{ document.getElementById('sheetBody').innerHTML=''; }, 320);
}

/* ============ SEARCH ============ */
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  const val = e.target.value;
  document.getElementById('clearSearchBtn').classList.toggle('show', !!val);
  searchTimer = setTimeout(()=>{ state.query = val; renderSection(); }, 160);
});
function clearSearch(){
  const input = document.getElementById('searchInput');
  input.value = ''; state.query = '';
  document.getElementById('clearSearchBtn').classList.remove('show');
  renderSection();
}

/* ============ TOAST ============ */
let toastTimer;
function showToast(msg, type){
  const t = document.getElementById('toast');
  t.style.background = type==='error' ? '#C1432E' : (type==='success' ? '#4C7A57' : 'var(--forest)');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 3200);
}

/* ============ INIT ============ */
async function init(){
  state.data = await fetchLibraryItems();
  let firstNonEmpty = ORDER.find(k=> countFor(CATS[k].type) > 0);
  state.active = firstNonEmpty || 'books';
  renderChipsAndNav();
  renderSection();
}
document.readyState==='loading' ? document.addEventListener('DOMContentLoaded', init) : init();
</script>


</body></html>
