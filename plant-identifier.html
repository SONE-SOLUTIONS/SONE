<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="مُعرف النباتات - خدمة احترافية للتعرف على النباتات عبر الصور">
    <meta name="theme-color" content="#0A1408">
    <title>SONE | مُعرف النباتات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
            background: #0A1408;
            min-height: 100vh;
        }

        /* الهيدر العلوي */
        .top-bar {
            background: #1C2A16;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(168, 132, 66, 0.3);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FBFCFB, #A8842A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: #C1DCB5;
            font-weight: normal;
            margin-right: 5px;
        }

        .lang-selector {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-selector select {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(168, 132, 66, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #FBFCFB;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
        }

        .lang-selector select option {
            background: #1C2A16;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-buttons a {
            text-decoration: none;
            color: #C1DCB5;
            font-size: 0.85rem;
            transition: color 0.2s;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
        }

        .nav-buttons a:hover {
            color: #A8842A;
            background: rgba(168, 132, 66, 0.1);
        }

        /* المحتوى الرئيسي */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* بطاقة رفع الصورة */
        .upload-card {
            background: #1C2A16;
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(168, 132, 66, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-card:hover {
            box-shadow: 0 15px 35px -12px rgba(0,0,0,0.4);
            transform: translateY(-2px);
            border-color: rgba(168, 132, 66, 0.5);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #A8842A;
        }

        .upload-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #FBFCFB;
        }

        .upload-sub {
            font-size: 0.8rem;
            color: #C1DCB5;
            margin-top: 0.5rem;
        }

        .preview-area {
            margin: 1.5rem 0;
            display: none;
            text-align: center;
        }

        .preview-area img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid #A8842A;
        }

        /* أزرار الإجراءات */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, #A8842A, #C49B3A);
            color: #0A1408;
            border: none;
            padding: 0.9rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-secondary {
            flex: 1;
            background: rgba(168, 132, 66, 0.15);
            color: #C1DCB5;
            border: 1px solid rgba(168, 132, 66, 0.3);
            padding: 0.9rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #C49B3A, #A8842A);
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(168, 132, 66, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(168, 132, 66, 0.25);
            color: #FBFCFB;
        }

        .btn-primary:disabled {
            background: #4a5a40;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* بطاقات النتائج */
        .result-card {
            background: #1C2A16;
            border-radius: 24px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(168, 132, 66, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result-header {
            background: rgba(10, 20, 8, 0.8);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(168, 132, 66, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .result-time {
            font-size: 0.75rem;
            color: #C1DCB5;
        }

        .result-actions {
            display: flex;
            gap: 1rem;
        }

        .result-actions span {
            font-size: 0.75rem;
            color: #A8842A;
            cursor: pointer;
            transition: color 0.2s;
        }

        .result-actions span:hover {
            color: #C49B3A;
        }

        .plant-content {
            padding: 1.5rem;
        }

        .plant-name-main {
            font-size: 1.5rem;
            font-weight: 700;
            color: #A8842A;
            margin-bottom: 0.5rem;
        }

        .plant-scientific {
            font-size: 0.85rem;
            color: #C1DCB5;
            font-style: italic;
            margin-bottom: 0.8rem;
        }

        .plant-common {
            background: rgba(168, 132, 66, 0.15);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #C1DCB5;
            margin-bottom: 1rem;
        }

        .confidence-badge {
            background: rgba(168, 132, 66, 0.2);
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            color: #A8842A;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 0.8rem;
            margin: 1.2rem 0 0.5rem;
            flex-wrap: wrap;
        }

        .btn-google {
            background: rgba(168, 132, 66, 0.15);
            border: 1px solid rgba(168, 132, 66, 0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 28px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #C1DCB5;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }

        .btn-google:hover {
            background: rgba(168, 132, 66, 0.25);
            color: #FBFCFB;
        }

        .btn-details {
            background: rgba(168, 132, 66, 0.15);
            border: 1px solid rgba(168, 132, 66, 0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 28px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #C1DCB5;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }

        .btn-details:hover {
            background: rgba(168, 132, 66, 0.25);
            color: #FBFCFB;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(168, 132, 66, 0.2);
            border-top: 4px solid #A8842A;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner p {
            margin-top: 0.8rem;
            color: #A8842A;
        }

        .error-msg {
            background: rgba(244, 67, 54, 0.15);
            color: #fecaca;
            padding: 0.8rem;
            border-radius: 20px;
            margin: 1rem 0;
            text-align: center;
            display: none;
            border: 1px solid #f44336;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.7rem;
            color: #C1DCB5;
            border-top: 1px solid rgba(168, 132, 66, 0.2);
            margin-top: 2rem;
        }

        .footer span {
            color: #A8842A;
            font-weight: 600;
        }

        @media (max-width: 550px) {
            .container { padding: 1rem; }
            .top-bar { padding: 0.8rem 1rem; }
            .logo { font-size: 1.3rem; }
            .plant-name-main { font-size: 1.2rem; }
            .button-group { flex-direction: column; }
            .btn-google, .btn-details { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        SONE
        <span class="logo-sub">مُعرف النباتات</span>
    </div>
    <div class="lang-selector">
        <select id="langSelect">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
        <div class="nav-buttons">
            <a href="#">تعريف جديد</a>
            <a href="#">نباتاتي</a>
            <a href="#">تثبيت</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="upload-card" id="uploadCard">
        <div class="upload-icon">
            <i class="fas fa-camera"></i>
        </div>
        <div class="upload-title">اضغط أو اسحب صورة نبات</div>
        <div class="upload-sub">يفضل تصوير الورقة أو الزهرة عن قرب</div>
        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;">
    </div>

    <div class="preview-area" id="previewArea">
        <img id="previewImg" alt="معاينة النبات">
    </div>

    <div class="action-buttons">
        <button class="btn-primary" id="identifyBtn" disabled>
            <i class="fas fa-search"></i> التعرف على النبات
        </button>
        <button class="btn-secondary" id="resetBtn">
            <i class="fas fa-trash-alt"></i> مسح
        </button>
    </div>

    <div class="loading-spinner" id="loading">
        <div class="spinner"></div>
        <p>جاري التعرف على النبات...</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="resultsContainer"></div>

    <div class="footer">
        بواسطة <span>Plant.id API</span> | التعرف الذكي على النباتات
        <br>
        © 2025 SONE - SMART SOLUTIONS, GREEN FUTURE
    </div>
</div>

<script>
    const PLANTID_KEY = "Rd1zUfeDaGkchXCIUR3PwqSBpD89Foqp6gqLcs7PqcUAqUU2k9";
    
    let currentImageFile = null;
    let currentImageBase64 = null;

    const uploadCard = document.getElementById('uploadCard');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const previewImg = document.getElementById('previewImg');
    const identifyBtn = document.getElementById('identifyBtn');
    const resetBtn = document.getElementById('resetBtn');
    const loadingDiv = document.getElementById('loading');
    const errorDiv = document.getElementById('errorMsg');
    const resultsContainer = document.getElementById('resultsContainer');

    uploadCard.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            currentImageFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewImg.src = ev.target.result;
                previewArea.style.display = 'block';
                identifyBtn.disabled = false;
                hideError();
                resultsContainer.innerHTML = '';
            };
            reader.readAsDataURL(file);
        }
    });

    uploadCard.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadCard.style.background = 'rgba(168, 132, 66, 0.1)';
    });
    
    uploadCard.addEventListener('dragleave', () => {
        uploadCard.style.background = '#1C2A16';
    });
    
    uploadCard.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadCard.style.background = '#1C2A16';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            currentImageFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewImg.src = ev.target.result;
                previewArea.style.display = 'block';
                identifyBtn.disabled = false;
                hideError();
                resultsContainer.innerHTML = '';
            };
            reader.readAsDataURL(file);
        }
    });

    resetBtn.addEventListener('click', () => {
        currentImageFile = null;
        currentImageBase64 = null;
        previewArea.style.display = 'none';
        identifyBtn.disabled = true;
        resultsContainer.innerHTML = '';
        hideError();
        fileInput.value = '';
    });

    async function toBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result.split(',')[1]);
            reader.readAsDataURL(file);
        });
    }

    async function identifyWithPlantId(imageBase64) {
        const requestBody = {
            images: [imageBase64],
            organs: ['leaf', 'flower', 'fruit', 'bark'],
            include_images: false
        };
        const proxy = "https://cors-anywhere.herokuapp.com/";
        const url = "https://api.plant.id/v2/identify";
        
        const response = await fetch(proxy + url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Api-Key": PLANTID_KEY
            },
            body: JSON.stringify(requestBody)
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    }

    function displayResults(data) {
        if (!data.suggestions || data.suggestions.length === 0) {
            showError("لم يتم التعرف على نبات. جرب صورة أوضح.");
            return;
        }

        const now = new Date();
        const timeStr = now.toLocaleString('ar-EG');

        let html = `
            <div style="margin-bottom:0.8rem; font-size:0.75rem; color:#C1DCB5;">
                <i class="far fa-clock"></i> ${timeStr}
            </div>
            <div style="margin-bottom:1rem; display:flex; gap:0.8rem; flex-wrap:wrap;">
                <span style="background:rgba(168,132,66,0.15); padding:0.2rem 0.8rem; border-radius:20px; font-size:0.7rem; color:#C1DCB5;">
                    <i class="fas fa-globe"></i> ${getLanguageName()}
                </span>
                <span style="background:rgba(168,132,66,0.15); padding:0.2rem 0.8rem; border-radius:20px; font-size:0.7rem; color:#C1DCB5; cursor:pointer;" onclick="resetAndRetry()">
                    <i class="fas fa-sync-alt"></i> محاولة جديدة
                </span>
            </div>
        `;

        const topSuggestions = data.suggestions.slice(0, 3);
        
        topSuggestions.forEach((suggestion, idx) => {
            const probability = Math.round((suggestion.probability || 0) * 100);
            const plantName = suggestion.plant_name || "نبات غير معروف";
            const scientificName = suggestion.plant_details?.scientific_name || plantName;
            const commonNames = suggestion.plant_details?.common_names || [];
            const commonNamesText = commonNames.slice(0, 3).join('، ');
            
            html += `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-time">
                            <i class="fas fa-leaf"></i> نبات ${idx + 1}
                        </div>
                        <div class="result-actions">
                            <span onclick="changePlantLanguage('${escapeHtml(plantName)}')">
                                <i class="fas fa-language"></i> تغيير اللغة
                            </span>
                            <span onclick="deleteResult(this)">
                                <i class="fas fa-trash-alt"></i> حذف
                            </span>
                        </div>
                    </div>
                    <div class="plant-content">
                        <div class="plant-name-main">${escapeHtml(plantName)}</div>
                        <div class="plant-scientific">${escapeHtml(scientificName)}</div>
                        ${commonNamesText ? `<div class="plant-common"><i class="fas fa-book-open"></i> ${escapeHtml(commonNamesText)} ${commonNames.length > 3 ? '...' : ''}</div>` : ''}
                        <div>
                            <span class="confidence-badge">
                                <i class="fas fa-chart-line"></i> نسبة الدقة: ${probability}%
                            </span>
                        </div>
                        <div class="button-group">
                            <a href="https://www.google.com/search?q=${encodeURIComponent(plantName + ' نبات')}" target="_blank" class="btn-google">
                                <i class="fab fa-google"></i> بحث في Google
                            </a>
                            <button class="btn-details" onclick="showDetails('${escapeHtml(plantName)}', '${escapeHtml(scientificName)}', '${escapeHtml(commonNamesText)}', ${probability})">
                                <i class="fas fa-info-circle"></i> تفاصيل
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        
        resultsContainer.innerHTML = html;
    }

    async function startIdentification() {
        if (!currentImageFile) {
            showError("الرجاء اختيار صورة أولاً");
            return;
        }

        identifyBtn.disabled = true;
        loadingDiv.style.display = 'block';
        hideError();
        resultsContainer.innerHTML = '';

        try {
            let base64 = currentImageBase64;
            if (!base64) {
                base64 = await toBase64(currentImageFile);
                currentImageBase64 = base64;
            }
            
            const data = await identifyWithPlantId(base64);
            displayResults(data);
            
        } catch (error) {
            console.error(error);
            showError("خطأ في الاتصال. تأكد من الإنترنت وجرب مرة أخرى.");
        } finally {
            loadingDiv.style.display = 'none';
            identifyBtn.disabled = false;
        }
    }

    identifyBtn.addEventListener('click', startIdentification);

    function showDetails(name, scientific, common, score) {
        alert(`الاسم: ${name}\nالاسم العلمي: ${scientific}\nالأسماء الشائعة: ${common || 'غير متوفر'}\nنسبة الدقة: ${score}%`);
    }
    window.showDetails = showDetails;
    
    function deleteResult(element) {
        const card = element.closest('.result-card');
        if (card) card.remove();
    }
    window.deleteResult = deleteResult;
    
    function changePlantLanguage(plantName) {
        alert(`يمكنك تغيير لغة عرض النبات "${plantName}" من إعدادات الموقع.`);
    }
    window.changePlantLanguage = changePlantLanguage;
    
    function resetAndRetry() {
        resetBtn.click();
    }
    window.resetAndRetry = resetAndRetry;
    
    function getLanguageName() {
        const lang = document.getElementById('langSelect').value;
        if (lang === 'ar') return 'العربية';
        if (lang === 'en') return 'English';
        return 'Français';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showError(msg) {
        errorDiv.innerText = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
    }
    
    function hideError() {
        errorDiv.style.display = 'none';
    }
</script>

</body>
</html>
