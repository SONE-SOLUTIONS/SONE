<!DOCTYPE html>
<html lang="fr" dir="ltr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3C4A2E">
<title>Herbier — Identification des plantes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1ECDD;
    --ink:#232B1E;
    --ink-soft:#4B5540;
    --moss:#586B44;
    --moss-dark:#3C4A2E;
    --gold:#B9852E;
    --rust:#A2472A;
    --line: rgba(35,43,30,0.22);
    --radius: 6px;
    --font-body: 'Cairo', 'Inter', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(35,43,30,0.05) 1px, transparent 0);
    background-size: 22px 22px;
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    padding:0 0 4rem;
  }
  .wrap{max-width:900px; margin:0 auto; padding:0 20px;}

  /* LANG SWITCH */
  .lang-bar{
    display:flex; justify-content:flex-end;
    gap:6px;
    padding:16px 0 0;
    flex-wrap:wrap;
  }
  .lang-btn{
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:600;
    padding:8px 14px;
    min-height:36px;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.02em;
  }
  .lang-btn.active{
    background:var(--moss-dark);
    border-color:var(--moss-dark);
    color:var(--paper);
  }

  /* HEADER */
  header{
    padding:1.6rem 0 2rem;
    text-align:center;
    border-bottom:1px solid var(--line);
    margin-bottom:2rem;
  }
  .brand-logo{
    display:block;
    width:56px; height:56px;
    margin:0 auto .9rem;
    border-radius:12px;
    object-fit:cover;
    border:1px solid var(--line);
    background:#fff;
  }
  .eyebrow{
    font-size:13px;
    letter-spacing:.12em;
    color:var(--gold);
    font-weight:600;
    text-transform:uppercase;
    margin-bottom:.6rem;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(28px,7vw,50px);
    margin:0 0 .5rem;
    color:var(--moss-dark);
    line-height:1.15;
  }
  header p{
    color:var(--ink-soft);
    font-size:15.5px;
    max-width:480px;
    margin:0 auto;
    line-height:1.7;
    padding:0 8px;
  }

  /* LAST SEARCH BANNER */
  .last-search{
    display:none;
    background:rgba(88,107,68,0.08);
    border:1px solid rgba(88,107,68,0.28);
    border-radius:var(--radius);
    padding:12px 16px;
    margin-bottom:1.4rem;
    font-size:13px;
    color:var(--moss-dark);
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }
  .last-search.show{display:flex;}
  .last-search .ls-text{flex:1; min-width:180px;}
  .last-search .ls-text b{font-weight:600;}
  .last-search-actions{display:flex; gap:8px; flex-wrap:wrap;}
  .ls-btn{
    border:1px solid var(--moss);
    background:transparent;
    color:var(--moss-dark);
    font-family:var(--font-body);
    font-size:12px;
    font-weight:600;
    padding:6px 12px;
    min-height:32px;
    border-radius:6px;
    cursor:pointer;
  }
  .ls-btn.ghost{border-color:var(--line); color:var(--ink-soft);}

  /* SPECIMEN SHEET */
  .sheet{
    background:#FBF8EF;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.6rem;
    position:relative;
    margin-bottom:2rem;
  }
  .sheet::before{
    content:"";
    position:absolute; inset:8px;
    border:1px dashed rgba(35,43,30,0.28);
    border-radius:4px;
    pointer-events:none;
  }
  .corner{
    position:absolute;
    width:24px; height:24px;
    background:linear-gradient(135deg, rgba(185,133,46,0.35), rgba(185,133,46,0.12));
    border:1px solid rgba(185,133,46,0.4);
  }
  .corner.tl{top:-7px; inset-inline-start:-7px; transform:rotate(-8deg);}
  .corner.tr{top:-7px; inset-inline-end:-7px; transform:rotate(8deg);}

  .drop{
    border:2px dashed var(--line);
    border-radius:4px;
    padding:2.2rem 1.2rem;
    text-align:center;
    cursor:pointer;
    transition:border-color .2s, background .2s;
    background:rgba(143,163,126,0.06);
    -webkit-user-select:none; user-select:none;
  }
  .drop.drag{border-color:var(--moss); background:rgba(143,163,126,0.18);}
  .drop-icon{width:28px; height:28px; margin:0 auto .6rem; color:var(--moss);}
  .drop-title{font-weight:600; font-size:15.5px; margin-bottom:.25rem;}
  .drop-sub{font-size:12.5px; color:var(--ink-soft);}
  input[type=file]{display:none;}

  .previews{
    display:flex; flex-wrap:wrap; gap:10px;
    margin-top:1.1rem;
  }
  .thumb{
    position:relative;
    width:76px; height:76px;
    border-radius:4px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb button{
    position:absolute; top:2px; inset-inline-start:2px;
    background:rgba(35,43,30,0.75);
    color:#fff; border:none; border-radius:50%;
    width:22px; height:22px; font-size:13px; line-height:1;
    cursor:pointer;
  }

  .organ-row{
    display:flex; flex-wrap:wrap; gap:8px;
    margin-top:1.3rem;
  }
  .organ-label{
    width:100%;
    font-size:13px; color:var(--ink-soft); font-weight:600;
    margin-bottom:.4rem;
  }
  .chip{
    border:1px solid var(--line);
    background:transparent;
    padding:8px 15px;
    min-height:38px;
    border-radius:999px;
    font-size:13px;
    font-family:var(--font-body);
    cursor:pointer;
    color:var(--ink-soft);
    transition:all .15s;
  }
  .chip.active{
    background:var(--moss);
    border-color:var(--moss);
    color:#fff;
  }

  .submit-row{
    margin-top:1.6rem;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .btn-main{
    background:var(--moss-dark);
    color:var(--paper);
    border:none;
    padding:13px 26px;
    min-height:46px;
    width:100%;
    border-radius:5px;
    font-family:var(--font-body);
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn-main:hover{background:var(--moss);}
  .btn-main:active{transform:scale(.98);}
  .btn-main:disabled{background:#B4B2A9; cursor:not-allowed;}
  .hint{font-size:12px; color:var(--ink-soft); text-align:center; width:100%;}

  .error-box{
    margin-top:1.1rem;
    background:rgba(162,71,42,0.08);
    border:1px solid rgba(162,71,42,0.35);
    color:var(--rust);
    padding:12px 16px;
    border-radius:4px;
    font-size:13.5px;
    display:none;
  }

  .loading{
    display:none;
    text-align:center;
    padding:2.2rem 0;
    color:var(--ink-soft);
  }
  .loading .spinner{
    width:30px; height:30px;
    border-radius:50%;
    border:3px solid var(--line);
    border-top-color:var(--moss);
    margin:0 auto 1rem;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .results-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:2.2rem 0 1rem;
    padding-bottom:.6rem;
    border-bottom:1px solid var(--line);
    gap:8px; flex-wrap:wrap;
  }
  .results-head h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    margin:0;
    color:var(--moss-dark);
  }
  .results-head span{font-size:12.5px; color:var(--ink-soft);}

  .card{
    background:#FBF8EF;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.2rem 1.3rem;
    margin-bottom:12px;
    display:grid;
    grid-template-columns:1fr auto;
    gap:1rem;
    align-items:center;
    position:relative;
  }
  .card:first-child{border-color:var(--gold); border-width:1.5px;}
  .sci-name{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:600;
    font-size:18px;
    color:var(--ink);
    margin:0 0 .3rem;
    line-height:1.3;
  }
  .common-name{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:0 0 .5rem;
    line-height:1.5;
  }
  .family-tag{
    display:inline-block;
    font-size:11px;
    color:var(--moss-dark);
    background:rgba(88,107,68,0.12);
    padding:3px 10px;
    border-radius:999px;
    font-weight:600;
  }
  .stamp{
    border:2px solid var(--gold);
    color:var(--gold);
    border-radius:50%;
    width:58px; height:58px;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    transform:rotate(-6deg);
    font-family:'Fraunces', serif;
    font-weight:600;
    flex-shrink:0;
  }
  .stamp .pct{font-size:15px; line-height:1;}
  .stamp .lbl{font-size:7.5px; letter-spacing:.05em; margin-top:1px;}

  .empty{
    text-align:center;
    padding:2.6rem 0;
    color:var(--ink-soft);
    font-size:14px;
  }

  footer{
    text-align:center;
    margin-top:3rem;
    font-size:12px;
    color:var(--ink-soft);
  }
  footer a{color:var(--gold); text-decoration:none;}

  @media(max-width:480px){
    .wrap{padding:0 14px;}
    header{padding:1.2rem 0 1.6rem;}
    .sheet{padding:1.1rem;}
    .card{grid-template-columns:1fr; text-align:start;}
    .stamp{justify-self:start;}
    .lang-btn{padding:7px 11px; font-size:12px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="lang-bar">
    <button class="lang-btn" data-lang="fr">Français</button>
    <button class="lang-btn" data-lang="ar">العربية</button>
    <button class="lang-btn" data-lang="en">English</button>
  </div>

  <header>
    <img class="brand-logo" src="https://sone-solutions.github.io/SONE/SONELOGE.jpg" alt="SONE" loading="lazy">
    <div class="eyebrow" data-i18n="eyebrow"></div>
    <h1 data-i18n="title"></h1>
    <p data-i18n="subtitle"></p>
  </header>

  <div class="last-search" id="lastSearchBanner">
    <div class="ls-text" id="lastSearchText"></div>
    <div class="last-search-actions">
      <button class="ls-btn" id="lsViewBtn" data-i18n="lsView"></button>
      <button class="ls-btn ghost" id="lsClearBtn" data-i18n="lsClear"></button>
    </div>
  </div>

  <div class="sheet">
    <div class="corner tl"></div>
    <div class="corner tr"></div>

    <div class="drop" id="dropZone">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 16V17.5C4 18.8807 5.11929 20 6.5 20H17.5C18.8807 20 20 18.8807 20 17.5V16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="drop-title" data-i18n="dropTitle"></div>
      <div class="drop-sub" data-i18n="dropSub"></div>
      <input type="file" id="fileInput" accept="image/*" multiple capture="environment">
    </div>

    <div class="previews" id="previews"></div>

    <div class="organ-row">
      <div class="organ-label" data-i18n="organLabel"></div>
      <button class="chip active" data-organ="auto" data-i18n="organAuto"></button>
      <button class="chip" data-organ="leaf" data-i18n="organLeaf"></button>
      <button class="chip" data-organ="flower" data-i18n="organFlower"></button>
      <button class="chip" data-organ="fruit" data-i18n="organFruit"></button>
      <button class="chip" data-organ="bark" data-i18n="organBark"></button>
      <button class="chip" data-organ="habit" data-i18n="organHabit"></button>
    </div>

    <div class="submit-row">
      <button class="btn-main" id="identifyBtn" disabled data-i18n="submitBtn"></button>
      <span class="hint" data-i18n="submitHint"></span>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <div data-i18n="loadingText"></div>
  </div>

  <div id="resultsArea"></div>

  <footer>
    <span data-i18n="footerPrefix"></span> <a href="https://plantnet.org" target="_blank" rel="noopener">PlantNet</a> — <span data-i18n="footerSuffix"></span>
  </footer>
</div>

<script>
const API_KEY = "2b10GUflX7cOfwIxr75DMqwkju";
const PROJECT = "all";
const API_URL = `https://my-api.plantnet.org/v2/identify/${PROJECT}?api-key=${API_KEY}`;
const STORAGE_KEY = "sone_plantid_last_search";

const I18N = {
  fr: {
    dir: 'ltr', htmlLang: 'fr',
    pageTitle: 'Herbier — Identification des plantes',
    eyebrow: 'Herbier numérique',
    title: 'Identifier une plante',
    subtitle: 'Téléversez une photo d\u2019une feuille, d\u2019une fleur, d\u2019un fruit ou d\u2019une écorce, et nous identifierons l\u2019espèce grâce à la base de données PlantNet.',

    footerSuffix: 'un outil gratuit à usage scientifique et éducatif',
    lsPrefix: 'Dernière recherche : ',
    lsOn: 'le',
    lsView: 'Revoir',
    lsClear: 'Effacer'
  },
  ar: {
    dir: 'rtl', htmlLang: 'ar',
    pageTitle: 'عشبية — تعرّف على النباتات',
    eyebrow: 'مُعشِّبة رقمية',
    title: 'تعرّف على النبات',
    subtitle: 'ارفع صورة لورقة، زهرة، ثمرة أو لحاء، وسنخبرك باسم النبات باستخدام قاعدة بيانات PlantNet.',
    dropTitle: 'اسحب الصور هنا أو المس للاختيار',
    dropSub: 'حتى 5 صور لنفس النبات لتحسين الدقة',
    organLabel: 'أي جزء من النبات يظهر في الصورة؟',
    organAuto: 'تلقائي', organLeaf: 'ورقة', organFlower: 'زهرة', organFruit: 'ثمرة', organBark: 'لحاء', organHabit: 'النبات كاملاً',
    submitBtn: 'تعرّف على النبات',
    submitHint: 'تحتاج صورة واحدة على الأقل',
    loadingText: 'جارٍ تحليل الصورة عبر PlantNet…',
    resultsTitle: 'النتائج المحتملة',
    matchWord: 'تطابق', matchesWord: 'تطابقات', stampLabel: 'تطابق',
    noCommonName: 'لا يوجد اسم شائع مسجل',
    unknownSpecies: 'غير معروف',
    emptyResult: 'لم نتمكن من التعرّف على النبات في هذه الصورة. جرّب صورة أوضح أو زاوية مختلفة.',
    errorPrefix: 'حدث خطأ: ',
    genericError: 'تعذّر الاتصال بخدمة PlantNet',
    footerPrefix: 'مدعوم من',
    footerSuffix: 'أداة تعرّف مجانية لأغراض علمية وتعليمية',
    lsPrefix: 'آخر بحث: ',
    lsOn: 'بتاريخ',
    lsView: 'عرض',
    lsClear: 'مسح'
  },
  en: {
    dir: 'ltr', htmlLang: 'en',
    pageTitle: 'Herbarium — Plant Identification',
    eyebrow: 'Digital Herbarium',
    title: 'Identify a Plant',
    subtitle: 'Upload a photo of a leaf, flower, fruit or bark, and we will identify the species using the PlantNet database.',
    dropTitle: 'Drag images here or tap to browse',
    dropSub: 'Up to 5 photos of the same plant for better accuracy',
    organLabel: 'Which part of the plant is shown?',
    organAuto: 'Auto', organLeaf: 'Leaf', organFlower: 'Flower', organFruit: 'Fruit', organBark: 'Bark', organHabit: 'Whole plant',
    submitBtn: 'Identify plant',
    submitHint: 'At least one photo is required',
    loadingText: 'Analyzing your photo with PlantNet…',
    resultsTitle: 'Likely matches',
    matchWord: 'match', matchesWord: 'matches', stampLabel: 'match',
    noCommonName: 'No common name on record',
    unknownSpecies: 'Unknown',
    emptyResult: 'We could not identify this plant. Try a clearer photo or a different angle.',
    errorPrefix: 'Error: ',
    genericError: 'Could not reach the PlantNet service',
    footerPrefix: 'Powered by',
    footerSuffix: 'a free tool for scientific and educational use',
    lsPrefix: 'Last search: ',
    lsOn: 'on',
    lsView: 'View',
    lsClear: 'Clear'
  }
};

let currentLang = 'fr';
let selectedFiles = [];
let selectedOrgan = "auto";
let lastResultsData = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const previews = document.getElementById('previews');
const identifyBtn = document.getElementById('identifyBtn');
const errorBox = document.getElementById('errorBox');
const loadingBox = document.getElementById('loadingBox');
const resultsArea = document.getElementById('resultsArea');
const htmlRoot = document.getElementById('htmlRoot');
const lastSearchBanner = document.getElementById('lastSearchBanner');
const lastSearchText = document.getElementById('lastSearchText');
const lsViewBtn = document.getElementById('lsViewBtn');
const lsClearBtn = document.getElementById('lsClearBtn');

function saveLastSearch(data){
  try{
    const payload = {
      timestamp: Date.now(),
      organ: selectedOrgan,
      data: data
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }catch(e){}
}

function loadLastSearch(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){ return null; }
}

function clearLastSearch(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  lastSearchBanner.classList.remove('show');
}

function formatDate(ts, lang){
  const d = new Date(ts);
  const locale = lang === 'ar' ? 'ar' : (lang === 'fr' ? 'fr-FR' : 'en-US');
  return d.toLocaleDateString(locale, { day: 'numeric', month: 'short', year: 'numeric' });
}

function refreshLastSearchBanner(){
  const saved = loadLastSearch();
  const t = I18N[currentLang];
  if(saved && saved.data){
    const topName = saved.data.results && saved.data.results[0] && saved.data.results[0].species
      ? saved.data.results[0].species.scientificNameWithoutAuthor
      : t.unknownSpecies;
    lastSearchText.innerHTML = `${t.lsPrefix}<b>${topName}</b> — ${t.lsOn} ${formatDate(saved.timestamp, currentLang)}`;
    lastSearchBanner.classList.add('show');
  }else{
    lastSearchBanner.classList.remove('show');
  }
}

lsViewBtn.addEventListener('click', () => {
  const saved = loadLastSearch();
  if(saved && saved.data){
    lastResultsData = saved.data;
    renderResults(saved.data);
    resultsArea.scrollIntoView({behavior:'smooth', block:'start'});
  }
});

lsClearBtn.addEventListener('click', clearLastSearch);

function applyLanguage(lang){
  currentLang = lang;
  const t = I18N[lang];
  htmlRoot.setAttribute('lang', t.htmlLang);
  htmlRoot.setAttribute('dir', t.dir);
  document.title = t.pageTitle;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if(t[key] !== undefined) el.textContent = t[key];
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  try{ localStorage.setItem('sone_plantid_lang', lang); }catch(e){}

  refreshLastSearchBanner();
  if(lastResultsData){
    renderResults(lastResultsData);
  }
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLanguage(btn.dataset.lang));
});

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList){
  const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  for(const f of files){
    if(selectedFiles.length >= 5) break;
    selectedFiles.push(f);
  }
  renderPreviews();
}

function renderPreviews(){
  previews.innerHTML = '';
  selectedFiles.forEach((file, idx) => {
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'thumb';
    div.innerHTML = `<img src="${url}"><button data-idx="${idx}">&times;</button>`;
    previews.appendChild(div);
  });
  previews.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.target.dataset.idx);
      selectedFiles.splice(idx, 1);
      renderPreviews();
    });
  });
  identifyBtn.disabled = selectedFiles.length === 0;
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedOrgan = chip.dataset.organ;
  });
});

identifyBtn.addEventListener('click', async () => {
  if(selectedFiles.length === 0) return;
  const t = I18N[currentLang];
  errorBox.style.display = 'none';
  resultsArea.innerHTML = '';
  lastResultsData = null;
  loadingBox.style.display = 'block';
  identifyBtn.disabled = true;

  try{
    const form = new FormData();
    selectedFiles.forEach(file => {
      form.append('images', file);
      form.append('organs', selectedOrgan === 'auto' ? 'auto' : selectedOrgan);
    });

    const res = await fetch(API_URL, { method: 'POST', body: form });
    const data = await res.json();

    if(!res.ok){
      throw new Error(data.message || t.genericError);
    }

    lastResultsData = data;
    renderResults(data);
    saveLastSearch(data);
    refreshLastSearchBanner();
  }catch(err){
    errorBox.textContent = t.errorPrefix + err.message;
    errorBox.style.display = 'block';
  }finally{
    loadingBox.style.display = 'none';
    identifyBtn.disabled = false;
  }
});

function renderResults(data){
  const t = I18N[currentLang];
  const results = (data.results || []).slice(0, 5);
  if(results.length === 0){
    resultsArea.innerHTML = `<div class="empty">${t.emptyResult}</div>`;
    return;
  }

  const matchLabel = results.length === 1 ? t.matchWord : t.matchesWord;
  let html = `<div class="results-head"><h2>${t.resultsTitle}</h2><span>${results.length} ${matchLabel}</span></div>`;

  results.forEach(r => {
    const sci = r.species?.scientificNameWithoutAuthor || t.unknownSpecies;
    const common = (r.species?.commonNames || []).slice(0,3).join(currentLang === 'ar' ? '\u060c ' : ', ') || t.noCommonName;
    const family = r.species?.family?.scientificNameWithoutAuthor || '';
    const pct = Math.round((r.score || 0) * 100);

    html += `
      <div class="card">
        <div>
          <p class="sci-name">${sci}</p>
          <p class="common-name">${common}</p>
          ${family ? `<span class="family-tag">${family}</span>` : ''}
        </div>
        <div class="stamp">
          <span class="pct">${pct}%</span>
          <span class="lbl">${t.stampLabel}</span>
        </div>
      </div>
    `;
  });

  resultsArea.innerHTML = html;
}

(function init(){
  let startLang = 'fr';
  try{
    const savedLang = localStorage.getItem('sone_plantid_lang');
    if(savedLang && I18N[savedLang]) startLang = savedLang;
  }catch(e){}
  applyLanguage(startLang);
})();
</script>
</body>
</html>
