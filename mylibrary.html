<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONE LIBRARY - منصة المعرفة</title>

    <!-- Preconnect للروابط الخارجية -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">

    <!-- Font Awesome - نسخة محسّنة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Google Fonts - Cairo فقط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" 
          rel="stylesheet">

    <!-- AOS - lazy load -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" media="print" 
          onload="this.media='all'">

    <style>
        /* ===== CSS RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #b8860b;
            --primary-dark: #a0750a;
            --bg: #f8f9fa;
            --surface: #fff;
            --text: #1d1d1f;
            --text-secondary: #6c757d;
            --border: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* ===== HEADER ===== */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.95);
        }

        .top-nav .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .top-nav .logo img {
            height: 32px;
            width: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .top-nav .logo span {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
        }

        .top-nav .logo span small {
            font-weight: 400;
            font-size: 12px;
            color: var(--text-secondary);
            display: block;
            margin-top: -2px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-box {
            background: #f1f3f5;
            border-radius: 20px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.2);
        }

        .search-box input {
            border: none;
            background: transparent;
            padding: 6px 8px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            width: 200px;
            color: var(--text);
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box i {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .lang-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }

        .lang-btn.active, .lang-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .user-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .user-icon:hover {
            background: var(--primary);
            color: #fff;
        }

        /* ===== CATEGORY NAV ===== */
        .category-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 48px;
            gap: 24px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .category-nav::-webkit-scrollbar {
            display: none;
        }

        .category-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 3px solid transparent;
            transition: var(--transition);
            position: relative;
        }

        .category-nav a:hover, .category-nav a.active {
            color: var(--text);
            border-bottom-color: var(--primary);
        }

        .category-nav a i {
            margin-left: 6px;
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .tab-btn i {
            font-size: 14px;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .content-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .content-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== GRID ===== */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* ===== CARD ===== */
        .library-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .library-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .card-thumbnail {
            background: #f1f3f5;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .library-card:hover .card-thumbnail img {
            transform: scale(1.05);
        }

        .card-thumbnail .file-icon {
            font-size: 48px;
            color: var(--primary);
        }

        .card-thumbnail .file-icon img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }

        .card-body {
            padding: 12px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h4 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-body p {
            font-size: 12px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
            flex: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            border-top: 1px solid #f1f3f5;
            padding-top: 8px;
            gap: 8px;
        }

        .card-footer .meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .card-footer .meta i {
            margin-left: 4px;
        }

        .card-footer .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .card-footer .actions button,
        .card-footer .actions a.btn-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            border-radius: 6px;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .card-footer .actions button:hover,
        .card-footer .actions a.btn-action:hover {
            background: #f1f3f5;
            color: var(--primary);
        }

        .card-footer .actions a.btn-action.download-btn:hover {
            background: #d4edda;
            color: #28a745;
        }

        .card-footer .actions button.preview-btn:hover {
            background: #ffebee;
            color: #dc3545;
        }

        /* ===== EMPTY STATE ===== */
        .empty-library {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px dashed var(--border);
        }

        .empty-library i {
            font-size: 48px;
            color: var(--primary);
            opacity: 0.5;
        }

        .empty-library h3 {
            margin-top: 12px;
            color: var(--text);
            font-size: 18px;
        }

        .empty-library p {
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: left;
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--primary-dark);
        }

        .modal-content h2 {
            color: var(--text);
            margin-bottom: 12px;
            font-size: 20px;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .detail-viewer {
            background: #f1f3f5;
            border-radius: var(--radius-sm);
            padding: 8px;
            margin-bottom: 16px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .detail-viewer iframe,
        .detail-viewer img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 4px;
        }

        .detail-viewer .text-content {
            background: var(--surface);
            padding: 20px;
            border-radius: 4px;
            max-height: 60vh;
            overflow-y: auto;
            width: 100%;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            color: var(--text);
            text-align: left;
            direction: ltr;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-buttons a,
        .action-buttons button {
            flex: 1;
            min-width: 120px;
            padding: 10px 16px;
            border-radius: 30px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #f1f3f5;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* ===== PDF PREVIEW MODAL ===== */
        .pdf-preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .pdf-preview-modal.active {
            display: flex;
            opacity: 1;
        }

        .pdf-preview-content {
            background: var(--surface);
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .pdf-preview-modal.active .pdf-preview-content {
            transform: scale(1);
        }

        .pdf-preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .pdf-preview-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pdf-preview-header h3 i {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button,
        .header-actions a {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .header-actions button:hover,
        .header-actions a:hover {
            background: var(--primary-dark);
        }

        .close-preview {
            background: var(--border) !important;
            color: var(--text) !important;
            width: 32px;
            height: 32px;
            padding: 0 !important;
            border-radius: 50% !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-preview:hover {
            background: #dc3545 !important;
            color: #fff !important;
        }

        .pdf-preview-body {
            flex: 1;
            overflow: hidden;
            background: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .pdf-preview-body iframe {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
            border-radius: 0 0 16px 16px;
        }

        .pdf-loading, .pdf-error, .no-preview {
            text-align: center;
            padding: 40px;
        }

        .pdf-loading i {
            font-size: 48px;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }

        .pdf-loading p {
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .pdf-error {
            color: #dc3545;
        }

        .pdf-error i {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .no-preview {
            color: var(--text-secondary);
        }

        .no-preview i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .top-nav .nav-actions .search-box input {
                width: 120px;
            }

            .library-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 12px;
            }

            .category-nav {
                gap: 12px;
                padding: 0 12px;
            }

            .category-nav a {
                font-size: 13px;
            }

            .pdf-preview-content {
                max-height: 95vh;
                border-radius: 12px;
            }

            .pdf-preview-body iframe {
                min-height: 350px;
            }

            .modal-content {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .top-nav {
                padding: 0 12px;
                height: 56px;
            }

            .top-nav .logo span {
                font-size: 16px;
            }

            .top-nav .logo span small {
                font-size: 10px;
            }

            .top-nav .nav-actions .search-box input {
                width: 80px;
                font-size: 13px;
            }

            .library-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .card-thumbnail {
                height: 120px;
            }

            .container {
                padding: 16px 12px;
            }

            .tabs {
                gap: 6px;
            }

            .tab-btn {
                padding: 6px 12px;
                font-size: 13px;
            }
        }

        /* ===== PERFORMANCE OPTIMIZATIONS ===== */
        .library-card {
            contain: layout style paint;
        }

        .card-thumbnail img {
            content-visibility: auto;
        }

        /* Reduce motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    
        /* ===== PDF THUMBNAIL STYLES ===== */
        .pdf-thumb-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            transition: opacity 0.3s ease;
        }
        .pdf-thumb-loaded {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .pdf-thumb-loaded img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            animation: fadeInThumb 0.4s ease;
        }
        @keyframes fadeInThumb {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
</style>

    <!-- PDF.js for thumbnail generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
<base target="_blank">
</head>
<body>

    <!-- HEADER -->
    <header class="top-nav">
        <a href="#" class="logo">
            <img src="https://sone-solutions.github.io/SONE/SONELOGE.jpg" alt="SONE Logo" loading="lazy">
            <span>
                SONE LIBRARY
                <small>المنصة المتكاملة للفلاحة الذكية</small>
            </span>
        </a>

        <div class="nav-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن أي شيء..." autocomplete="off">
                <i class="fas fa-times-circle" id="clearSearchBtn" style="display:none; cursor:pointer; color:var(--primary);"></i>
            </div>
            <div>
                <button class="lang-btn active" data-lang="ar">عربي</button>
                <button class="lang-btn" data-lang="fr">FR</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="user-icon">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <!-- CATEGORY NAV -->
    <nav class="category-nav" id="categoryNav">
        <a href="#" data-tab="books"><i class="fas fa-book"></i> الكتب PDF</a>
        <a href="#" data-tab="articles"><i class="fas fa-file-alt"></i> المقالات</a>
        <a href="#" data-tab="videos"><i class="fas fa-video"></i> الفيديوهات</a>
        <a href="#" data-tab="reports" class="active"><i class="fas fa-chart-line"></i> التقارير</a>
        <a href="#" data-tab="trainings"><i class="fas fa-chalkboard-user"></i> عروض تدريب</a>
    </nav>

    <!-- MAIN CONTENT -->

    // ===== PDF THUMBNAIL GENERATOR =====
    const pdfThumbnailCache = new Map();

    const generatePdfThumbnail = async (pdfUrl, maxWidth = 200) => {
        if (pdfThumbnailCache.has(pdfUrl)) {
            return pdfThumbnailCache.get(pdfUrl);
        }

        try {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(1);

            const viewport = page.getViewport({ scale: 1 });
            const scale = maxWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;

            await page.render({
                canvasContext: context,
                viewport: scaledViewport
            }).promise;

            const base64 = canvas.toDataURL('image/jpeg', 0.85);
            pdfThumbnailCache.set(pdfUrl, base64);
            return base64;
        } catch (err) {
            console.error('PDF thumbnail error:', err);
            return null;
        }
    };

        }

        div.innerHTML = `
            <div class="card-thumbnail" id="thumb-${item.id}">${thumbHTML}</div>
            <div class="card-body">
                <h4>${item.filename}</h4>
                <p>...</p>
                <div class="card-footer">
                    <span class="meta">
                        <span><i class="fas fa-calendar-alt"></i> ${item.date || ''}</span>
                        <span><i class="fas fa-paperclip"></i> ${shortName}</span>
                    </span>
                    <div class="actions">
                        <button onclick="${isPdf ? `openPdfPreview(${item.id})` : `viewItem(${item.id}, '${item.type}')`}" title="${isPdf ? 'معاينة PDF' : 'عرض التفاصيل'}"><i class="fas fa-eye"></i></button>
                        <a href="${item.pdfurl}" target="_blank" style="text-decoration:none;color:inherit;">
                            <button title="فتح"><i class="fas fa-external-link-alt"></i></button>
                        </a>
                        <a href="${item.pdfurl}" download="${item.filename}" class="btn-action download-btn" title="تحميل">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                </div>
            </div>
        `;

        // Generate PDF thumbnail asynchronously
        if (isPdf && !item.thumb) {
            requestIdleCallback(() => {
                generatePdfThumbnail(item.pdfurl, 200).then(base64 => {
                    const container = document.getElementById(`pdf-thumb-${item.id}`);
                    if (container && base64) {
                        container.innerHTML = `<img src="${base64}" alt="صفحة أولى" style="width:100%;height:100%;object-fit:cover;">`;
                        container.classList.remove('pdf-thumb-placeholder');
                        container.classList.add('pdf-thumb-loaded');
                    }
                });
            }, { timeout: 500 });
        }

        return div;
    };
// ===== BATCH RENDERING =====
    const renderBatch = (items, containerId, startIndex = 0) => {
        const container = getEl(containerId);
        if (!container) return;

        const batch = items.slice(startIndex, startIndex + CONFIG.LAZY_BATCH_SIZE);
        if (!batch.length) return;

        const fragment = document.createDocumentFragment();
        batch.forEach(item => {
            if (state.renderedCards.has(item.id)) return;
            state.renderedCards.add(item.id);

            const card = createCard(item);
            fragment.appendChild(card);

            const img = card.querySelector('img[data-src]');
            if (img) imgObserver.observe(img);
        });

        container.appendChild(fragment);

        if (startIndex + CONFIG.LAZY_BATCH_SIZE < items.length) {
            requestIdleCallback(() => {
                renderBatch(items, containerId, startIndex + CONFIG.LAZY_BATCH_SIZE);
            }, { timeout: 200 });
        }
    };

    // ===== FILTER & SEARCH =====
    const filterItems = (items, query) => {
        if (!query) return items;
        const q = query.toLowerCase();
        return items.filter(i => i.filename.toLowerCase().includes(q));
    };

    const getPanelItems = (panelId) => {
        const typeMap = {
            'books-panel': 'book',
            'articles-panel': 'article',
            'videos-panel': 'video',
            'reports-panel': 'report',
            'trainings-panel': 'training'
        };
        const type = typeMap[panelId];
        const items = type ? libraryData.filter(i => i.type === type) : [];
        return filterItems(items, state.searchQuery);
    };

    // ===== PANEL SWITCHING =====
    const switchPanel = (panelId) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.category-nav a').forEach(a => a.classList.remove('active'));

        getEl(panelId)?.classList.add('active');
        document.querySelector(`.tab-btn[data-panel="${panelId}"]`)?.classList.add('active');

        const tabKey = panelId.replace('-panel', '');
        document.querySelector(`.category-nav a[data-tab="${tabKey}"]`)?.classList.add('active');
        state.currentTab = tabKey;

        if (!state.activePanels.has(panelId)) {
            state.activePanels.add(panelId);
            const items = getPanelItems(panelId);
            const gridId = tabKey + 'Grid';
            const container = getEl(gridId);

            if (container) {
                container.innerHTML = '';
                state.renderedCards.clear();
                if (!items.length) {
                    container.innerHTML = createEmptyState(tabKey);
                } else {
                    renderBatch(items, gridId);
                }
            }
        }
    };

    const createEmptyState = (type) => {
        const icons = { books: 'fa-book', articles: 'fa-file-alt', videos: 'fa-video', 
                       reports: 'fa-chart-line', trainings: 'fa-chalkboard-user' };
        const names = { books: 'الكتب', articles: 'المقالات', videos: 'الفيديوهات', 
                       reports: 'التقارير', trainings: 'عروض التدريب' };
        return `<div class="empty-library">
            <i class="fas ${icons[type] || 'fa-folder-open'}"></i>
            <h3>لا توجد ${names[type] || 'عناصر'}</h3>
            <p>جرب البحث بكلمات مختلفة</p>
        </div>`;
    };

    // ===== SEARCH =====
    const handleSearch = debounce((query) => {
        state.searchQuery = query;
        state.activePanels.clear();
        state.renderedCards.clear();

        const currentPanel = state.currentTab + '-panel';
        const gridId = state.currentTab + 'Grid';
        const container = getEl(gridId);

        if (container) {
            const items = getPanelItems(currentPanel);
            container.innerHTML = '';
            if (!items.length) {
                container.innerHTML = createEmptyState(state.currentTab);
            } else {
                renderBatch(items, gridId);
            }
        }

        getEl('clearSearchBtn').style.display = query ? 'inline-block' : 'none';
    }, CONFIG.DEBOUNCE_DELAY);

    const clearSearch = () => {
        const input = getEl('searchInput');
        if (input) { input.value = ''; handleSearch(''); }
    };

    // ===== MODALS =====
    const viewItem = (id, type) => {
        const item = libraryData.find(i => i.id === id);
        if (!item) return;

        getEl('modalTitle').textContent = item.filename;
        getEl('modalMeta').innerHTML = `
            <span><i class="fas fa-calendar-alt"></i> ${item.date || 'غير محدد'}</span>
            <span><i class="fas fa-file"></i> ${item.type}</span>
        `;

        const isPdf = item.filename.toLowerCase().endsWith('.pdf');
        getEl('modalViewer').innerHTML = isPdf 
            ? `<iframe src="${item.pdfurl}" loading="lazy" style="width:100%;height:500px;border:none;"></iframe>`
            : `<div class="no-preview"><i class="fas fa-file"></i><p>لا يتوفر معاينة لهذا النوع</p></div>`;

        getEl('modalActions').innerHTML = `
            <a href="${item.pdfurl}" download="${item.filename}" class="btn-primary"><i class="fas fa-download"></i> تحميل</a>
            <a href="${item.pdfurl}" target="_blank" class="btn-secondary"><i class="fas fa-external-link-alt"></i> فتح</a>
            <button onclick="closeModal()" class="btn-secondary">إغلاق</button>
        `;

        getEl('detailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    const closeModal = () => {
        getEl('detailModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    const closePdfPreview = () => {
        getEl('pdfPreviewModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    const openPdfPreview = (id) => {
        const item = libraryData.find(i => i.id === id);
        if (!item) return;

        getEl('pdfPreviewTitle').textContent = item.filename;

        const downloadLink = getEl('pdfDownloadLink');
        downloadLink.href = item.pdfurl;
        downloadLink.download = item.filename;

        getEl('pdfPreviewBody').innerHTML = `
            <iframe src="${item.pdfurl}" style="width:100%;height:100%;min-height:500px;border:none;" loading="lazy"></iframe>
        `;

        getEl('pdfPreviewModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };


    // ===== EVENT LISTENERS =====
    const init = () => {
        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                switchPanel(btn.dataset.panel);
            });
        });

        // Category Nav
        document.querySelectorAll('.category-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                switchPanel(link.dataset.tab + '-panel');
            });
        });

        // Search
        getEl('searchInput')?.addEventListener('input', (e) => handleSearch(e.target.value));
        getEl('clearSearchBtn')?.addEventListener('click', clearSearch);

        // Modal backdrops
        getEl('detailModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
        getEl('pdfPreviewModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closePdfPreview(); });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeModal(); closePdfPreview(); }
        });

        // Language
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Initialize first panel
        switchPanel('trainings-panel');

        // AOS
        if (typeof AOS !== 'undefined') AOS.init({ duration: 800, once: true });
    };

    document.readyState === 'loading' 
        ? document.addEventListener('DOMContentLoaded', init) 
        : init();
    </script>
</body>
</html>
