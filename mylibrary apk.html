<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#b8860b">
    <title>SONE LIBRARY - Formations</title>

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #b8860b;
            --primary-dark: #a0750a;
            --bg: #f5f5f7;
            --surface: #fff;
            --text: #1d1d1f;
            --text-secondary: #6c757d;
            --border: #e9ecef;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
        }

        input, textarea {
            user-select: text;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        /* HEADER */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.95);
        }

        .top-nav .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .top-nav .logo img {
            height: 32px;
            width: 32px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .top-nav .logo span {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            line-height: 1.2;
        }

        .top-nav .logo span small {
            font-weight: 400;
            font-size: 11px;
            color: var(--text-secondary);
            display: block;
            margin-top: -2px;
        }

        .nav-actions {
            display: none;
        }

        .search-box {
            background: #f1f3f5;
            border-radius: 20px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 2px rgba(184, 134, 11, 0.2);
        }

        .search-box input {
            border: none;
            background: transparent;
            padding: 6px 8px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            width: 200px;
            color: var(--text);
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box i {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* MAIN */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 72px 12px 24px;
        }

        .refresh-hint {
            text-align: center;
            padding: 12px;
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0.6;
        }

        /* GRID */
        .library-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* CARD */
        .library-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .library-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .card-thumbnail {
            background: #f1f3f5;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 16px 16px 0 0;
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .library-card:hover .card-thumbnail img {
            transform: scale(1.05);
        }

        .file-icon {
            font-size: 48px;
        }

        .file-icon img {
            width: 64px;
            height: 64px;
            object-fit: contain;
        }

        .pdf-thumb-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
        }

        .pdf-thumb-loaded {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .pdf-thumb-loaded img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: fadeInThumb 0.4s ease;
        }

        @keyframes fadeInThumb {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .card-body {
            padding: 10px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-body h4 {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-body p {
            font-size: 11px;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
            flex: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            border-top: 1px solid #f1f3f5;
            padding-top: 6px;
            gap: 8px;
        }

        .card-footer .meta {
            font-size: 10px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .card-footer .meta i {
            margin-left: 4px;
        }

        .card-footer .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .card-footer .actions button,
        .card-footer .actions a.btn-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 6px;
            border-radius: 6px;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            min-height: 44px;
            min-width: 44px;
        }

        .card-footer .actions button:hover,
        .card-footer .actions a.btn-action:hover {
            background: #f1f3f5;
            color: var(--primary);
        }

        .card-footer .actions a.btn-action.download-btn:hover {
            background: #d4edda;
            color: #28a745;
        }

        /* EMPTY STATE */
        .empty-library {
            grid-column: 1/-1;
            text-align: center;
            padding: 40px 20px;
            background: var(--surface);
            border-radius: 20px;
            border: 1px dashed var(--border);
        }

        .empty-library i {
            font-size: 48px;
            color: var(--primary);
            opacity: 0.5;
        }

        .empty-library h3 {
            margin-top: 12px;
            color: var(--text);
            font-size: 18px;
        }

        .empty-library p {
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* MODALS */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: left;
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--primary-dark);
        }

        .modal-content h2 {
            color: var(--text);
            margin-bottom: 12px;
            font-size: 20px;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .detail-viewer {
            background: #f1f3f5;
            border-radius: var(--radius-sm);
            padding: 8px;
            margin-bottom: 16px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .detail-viewer iframe,
        .detail-viewer img {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 4px;
        }

        .detail-viewer .text-content {
            background: var(--surface);
            padding: 20px;
            border-radius: 4px;
            max-height: 60vh;
            overflow-y: auto;
            width: 100%;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            color: var(--text);
            text-align: left;
            direction: ltr;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-buttons a,
        .action-buttons button {
            flex: 1;
            min-width: 120px;
            padding: 10px 16px;
            border-radius: 30px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 14px;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #f1f3f5;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* PDF PREVIEW MODAL */
        .pdf-preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .pdf-preview-modal.active {
            display: flex;
            opacity: 1;
        }

        .pdf-preview-content {
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .pdf-preview-modal.active .pdf-preview-content {
            transform: translateY(0);
        }

        .pdf-preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .pdf-preview-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pdf-preview-header h3 i {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-actions button,
        .header-actions a {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .header-actions button:hover,
        .header-actions a:hover {
            background: var(--primary-dark);
        }

        .close-preview {
            background: var(--border) !important;
            color: var(--text) !important;
            width: 32px;
            height: 32px;
            padding: 0 !important;
            border-radius: 50% !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-preview:hover {
            background: #dc3545 !important;
            color: #fff !important;
        }

        .pdf-preview-body {
            flex: 1;
            overflow: hidden;
            background: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .pdf-preview-body iframe {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
            border-radius: 0 0 20px 20px;
        }

        .pdf-loading, .pdf-error, .no-preview {
            text-align: center;
            padding: 40px;
        }

        .pdf-loading i {
            font-size: 48px;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }

        .pdf-loading p {
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .pdf-error {
            color: #dc3545;
        }

        .pdf-error i {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .no-preview {
            color: var(--text-secondary);
        }

        .no-preview i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 8px 16px 24px;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .bottom-bar .app-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* RESPONSIVE */
        @media (min-width: 769px) {
            .library-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            
            .top-nav .nav-actions {
                display: flex;
            }
            
            .nav-actions {
                display: flex;
                align-items: center;
                gap: 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

            <i class="fas fa-graduation-cap" style="color:var(--primary);"></i>
            SONE Formations
        </span>

        { id: 117, filename: "TARIK BOUIH RAPPOR__KARAM_5[1] [Lecture seule][Compatibility Mode].ppt", pdfurl: "https://zpjuhprlcaigmczhqlye.supabase.co/storage/v1/object/public/product-images/library/1783949391780_iu14am.ppt", type: "training", thumb: "https://sone-solutions.github.io/SONE/pptx.png", thumbAlt: "PPT", date: "13/07/2026" },
        { id: 118, filename: "rapport de stage duroc tomate cerise (1).pdf", pdfurl: "https://zpjuhprlcaigmczhqlye.supabase.co/storage/v1/object/public/product-images/library/1783949663176_c3ql8s.pdf", type: "training", thumb: "", thumbAlt: "PDF", date: "13/07/2026" }
    ];

    const state = {
        currentTab: 'trainings',
        searchQuery: '',
        activePanels: new Set(),
        renderedCards: new Set()
    };

    const debounce = (fn, delay) => {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => fn(...args), delay);
        };
    };

    const DOM = {};
    const getEl = (id) => DOM[id] || (DOM[id] = document.getElementById(id));

    const imgObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const img = entry.target;
                if (img.dataset.src) {
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                }
                imgObserver.unobserve(img);
            }
        });
    }, { rootMargin: '100px' });

    const FILE_ICONS = {
        pdf: { icon: 'fa-file-pdf', color: '#dc3545', img: 'https://sone-solutions.github.io/SONE/pdf.png' },
        docx: { icon: 'fa-file-word', color: '#2b579a', img: 'https://sone-solutions.github.io/SONE/images%20docx.png' },
        doc: { icon: 'fa-file-word', color: '#2b579a', img: 'https://sone-solutions.github.io/SONE/images%20docx.png' },
        pptx: { icon: 'fa-file-powerpoint', color: '#d24726', img: 'https://sone-solutions.github.io/SONE/pptx.png' },
        ppt: { icon: 'fa-file-powerpoint', color: '#d24726', img: 'https://sone-solutions.github.io/SONE/pptx.png' }
    };

    const getFileInfo = (filename) => {
        const ext = filename.split('.').pop().toLowerCase();
        return FILE_ICONS[ext] || { icon: 'fa-file', color: '#6c757d', img: '' };
    };

    const pdfThumbnailCache = new Map();

    const generatePdfThumbnail = async (pdfUrl, maxWidth = 200) => {
        if (pdfThumbnailCache.has(pdfUrl)) {
            return pdfThumbnailCache.get(pdfUrl);
        }
        try {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1 });
            const scale = maxWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;
            await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
            const base64 = canvas.toDataURL('image/jpeg', 0.85);
            pdfThumbnailCache.set(pdfUrl, base64);
            return base64;
        } catch (err) {
            console.error('PDF thumbnail error:', err);
            return null;
        }
    };

    const createCard = (item) => {
        const info = getFileInfo(item.filename);
        const shortName = item.filename.length > 25 ? item.filename.substring(0, 22) + '...' : item.filename;
        const ext = item.filename.split('.').pop().toLowerCase();
        const isPdf = ext === 'pdf';
        const isOffice = ['docx', 'doc', 'pptx', 'ppt'].includes(ext);
        const hasPreview = isPdf || isOffice;

        const div = document.createElement('div');
        div.className = 'library-card';
        div.dataset.id = item.id;
        div.dataset.pdfurl = item.pdfurl;
        div.dataset.filename = item.filename;
        div.dataset.type = item.type;

        let thumbHTML;
        if (item.thumb) {
            thumbHTML = `<img data-src="${item.thumb}" alt="${item.thumbAlt || ''}" loading="lazy">`;
        } else if (isPdf) {
            thumbHTML = `<div class="pdf-thumb-placeholder" id="pdf-thumb-${item.id}">
                <i class="fas fa-file-pdf" style="font-size:48px;color:#dc3545;"></i>
            </div>`;
        } else {
            thumbHTML = `<div class="file-icon"><i class="fas ${info.icon}" style="color:${info.color}"></i></div>`;
        }

        div.innerHTML = `
            <div class="card-thumbnail" id="thumb-${item.id}">${thumbHTML}</div>
            <div class="card-body">
                <h4>${item.filename}</h4>
                <p>...</p>
                <div class="card-footer">
                    <span class="meta">
                        <span><i class="fas fa-calendar-alt"></i> ${item.date || ''}</span>
                    </span>
                    <div class="actions">
                        <button onclick="${hasPreview ? `openPreview(${item.id})` : `viewItem(${item.id})`}" title="${hasPreview ? 'Aperçu' : 'Détails'}"><i class="fas fa-eye"></i></button>
                        <a href="${item.pdfurl}" download="${item.filename}" class="btn-action download-btn" title="Télécharger">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                </div>
            </div>
        `;

        if (isPdf && !item.thumb) {
            requestIdleCallback(() => {
                generatePdfThumbnail(item.pdfurl, 200).then(base64 => {
                    const container = document.getElementById(`pdf-thumb-${item.id}`);
                    if (container && base64) {
                        container.innerHTML = `<img src="${base64}" alt="Page 1" style="width:100%;height:100%;object-fit:cover;">`;
                        container.classList.remove('pdf-thumb-placeholder');
                        container.classList.add('pdf-thumb-loaded');
                    }
                });
            }, { timeout: 500 });
        }

        return div;
    };

    const renderBatch = (items, containerId, startIndex = 0) => {
        const container = getEl(containerId);
        if (!container) return;

        const batch = items.slice(startIndex, startIndex + CONFIG.LAZY_BATCH_SIZE);
        if (!batch.length) return;

        const fragment = document.createDocumentFragment();
        batch.forEach(item => {
            if (state.renderedCards.has(item.id)) return;
            state.renderedCards.add(item.id);

            const card = createCard(item);
            fragment.appendChild(card);

            const img = card.querySelector('img[data-src]');
            if (img) imgObserver.observe(img);
        });

        container.appendChild(fragment);

        if (startIndex + CONFIG.LAZY_BATCH_SIZE < items.length) {
            requestIdleCallback(() => {
                renderBatch(items, containerId, startIndex + CONFIG.LAZY_BATCH_SIZE);
            }, { timeout: 200 });
        }
    };

    const filterItems = (items, query) => {
        if (!query) return items;
        const q = query.toLowerCase();
        return items.filter(i => i.filename.toLowerCase().includes(q));
    };

    const renderPanel = () => {
        const items = filterItems(libraryData, state.searchQuery);
        const container = getEl('trainingsGrid');
        
        if (container) {
            container.innerHTML = '';
            state.renderedCards.clear();
            if (!items.length) {
                container.innerHTML = `<div class="empty-library">
                    <i class="fas fa-folder-open" style="font-size:48px;color:var(--primary);opacity:0.5;"></i>
                    <h3>Aucun document</h3>
                    <p>Essayez une autre recherche</p>
                </div>`;
            } else {
                renderBatch(items, 'trainingsGrid');
            }
        }
    };

    const handleSearch = debounce((query) => {
        state.searchQuery = query;
        state.renderedCards.clear();
        renderPanel();
        getEl('clearSearchBtn').style.display = query ? 'inline-block' : 'none';
    }, CONFIG.DEBOUNCE_DELAY);

    const clearSearch = () => {
        const input = getEl('searchInput');
        if (input) { input.value = ''; handleSearch(''); }
    };

    const viewItem = (id) => {
        const item = libraryData.find(i => i.id === id);
        if (!item) return;

        const ext = item.filename.split('.').pop().toLowerCase();
        const isPdf = ext === 'pdf';
        const isOffice = ['docx', 'doc', 'pptx', 'ppt'].includes(ext);
        const hasPreview = isPdf || isOffice;

        getEl('modalTitle').textContent = item.filename;
        getEl('modalMeta').innerHTML = `
            <span><i class="fas fa-calendar-alt"></i> ${item.date || 'Non spécifié'}</span>
            <span><i class="fas fa-file"></i> ${item.type}</span>
        `;

        let viewerHTML;
        if (isPdf) {
            viewerHTML = `<iframe src="${item.pdfurl}" loading="lazy" style="width:100%;height:500px;border:none;"></iframe>`;
        } else if (isOffice) {
            const officeUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(item.pdfurl)}`;
            viewerHTML = `<iframe src="${officeUrl}" loading="lazy" style="width:100%;height:500px;border:none;" allowfullscreen></iframe>`;
        } else {
            viewerHTML = `<div class="no-preview"><i class="fas fa-file" style="font-size:48px;"></i><p>Aucun aperçu disponible</p></div>`;
        }
        getEl('modalViewer').innerHTML = viewerHTML;

        getEl('modalActions').innerHTML = `
            <a href="${item.pdfurl}" download="${item.filename}" class="btn-primary"><i class="fas fa-download"></i> Télécharger</a>
            ${hasPreview ? `<button onclick="closeModal(); openPreview(${item.id});" class="btn-secondary"><i class="fas fa-expand"></i> Aperçu complet</button>` : ''}
            <a href="${item.pdfurl}" target="_blank" class="btn-secondary"><i class="fas fa-external-link-alt"></i> Ouvrir</a>
            <button onclick="closeModal()" class="btn-secondary">Fermer</button>
        `;

        getEl('detailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    const closeModal = () => {
        getEl('detailModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    const closePdfPreview = () => {
        getEl('pdfPreviewModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    const openPreview = (id) => {
        const item = libraryData.find(i => i.id === id);
        if (!item) return;

        const ext = item.filename.split('.').pop().toLowerCase();
        const isPdf = ext === 'pdf';
        const isOffice = ['docx', 'doc', 'pptx', 'ppt'].includes(ext);

        getEl('pdfPreviewTitle').textContent = item.filename;

        const downloadLink = getEl('pdfDownloadLink');
        downloadLink.href = item.pdfurl;
        downloadLink.download = item.filename;

        let viewerUrl;
        if (isPdf) {
            viewerUrl = item.pdfurl;
        } else if (isOffice) {
            viewerUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(item.pdfurl)}`;
        } else {
            viewerUrl = null;
        }

        if (viewerUrl) {
            getEl('pdfPreviewBody').innerHTML = `
                <iframe src="${viewerUrl}" style="width:100%;height:100%;min-height:600px;border:none;" loading="lazy" allowfullscreen></iframe>
            `;
        } else {
            getEl('pdfPreviewBody').innerHTML = `
                <div class="no-preview" style="padding:60px 20px;">
                    <i class="fas fa-file" style="font-size:48px;color:var(--primary);"></i>
                    <p style="margin-top:16px;">Aucun aperçu disponible</p>
                    <a href="${item.pdfurl}" download="${item.filename}" class="btn-primary" style="margin-top:16px;display:inline-block;">
                        <i class="fas fa-download"></i> Télécharger
                    </a>
                </div>
            `;
        }

        getEl('pdfPreviewModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    const init = () => {
        getEl('searchInput')?.addEventListener('input', (e) => handleSearch(e.target.value));
        getEl('clearSearchBtn')?.addEventListener('click', clearSearch);

        getEl('detailModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
        getEl('pdfPreviewModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closePdfPreview(); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeModal(); closePdfPreview(); }
        });

        renderPanel();
    };

    document.readyState === 'loading' 
        ? document.addEventListener('DOMContentLoaded', init) 
        : init();
    </script>
