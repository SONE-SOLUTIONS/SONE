<style>
/* ===== CORE VARIABLES (SONE LIBRARY STYLE) ===== */
:root {
    --primary: #b8860b;
    --primary-dark: #966e08;
    --primary-light: #fdf6e3;
    --bg: #f8f9fa;
    --surface: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6c757d;
    --border: #e9ecef;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Cairo', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}
html[dir="ltr"] body { font-family: 'Inter', 'Cairo', sans-serif; }

/* ===== HEADER ===== */
.top-nav {
    background: rgba(255,255,255,0.95);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
}
.top-nav .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
}
.top-nav .logo-img {
    height: 38px;
    width: 38px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid var(--border);
}
.top-nav .logo-text span {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
}
.top-nav .logo-text small {
    font-weight: 500;
    font-size: 11px;
    color: var(--text-secondary);
    display: block;
    margin-top: -2px;
}

.nav-actions { display: flex; align-items: center; gap: 12px; }

.search-box {
    background: var(--bg);
    border-radius: 8px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    border: 1px solid transparent;
    transition: var(--transition);
    height: 38px;
}
.search-box:focus-within {
    border-color: var(--primary);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
}
.search-box input {
    border: none;
    background: transparent;
    padding: 0 8px;
    font-family: inherit;
    outline: none;
    width: 180px;
    color: var(--text);
    font-size: 14px;
}
.search-box i { color: var(--text-secondary); font-size: 14px; }

.gps-btn {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 1px solid rgba(184, 134, 11, 0.2);
    height: 38px;
    padding: 0 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: var(--transition);
    white-space: nowrap;
}
.gps-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
.gps-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.gps-btn .fa-spinner { animation: spin 1s linear infinite; }

.lang-switcher {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
}
.lang-btn {
    background: transparent;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
}
.lang-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }

/* ===== MAIN CONTAINER ===== */
.container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

.page-header {
    text-align: center;
    margin-bottom: 32px;
}
.page-header h1 {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--text);
}
.page-header p {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 600px;
    margin: 0 auto;
}

/* ===== GRID & CARDS ===== */
.cities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
}

.city-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
    transition: var(--transition);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.city-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--primary);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 10px;
}
.card-header i {
    color: var(--primary);
    font-size: 18px;
}
.card-header h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
}
.card-header .coords {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
}

.times-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.time-box {
    background: var(--bg);
    padding: 12px;
    border-radius: var(--radius-sm);
    text-align: center;
}
.time-box .label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}
.time-box .value {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
}
.time-box.sunrise .value { color: #d97706; }
.time-box.sunset .value { color: #dc2626; }

.card-footer {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-secondary);
}
.card-footer .day-length {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
}
.card-footer .day-length i { color: var(--primary); }

/* ===== EMPTY & LOADING STATES ===== */
.loading-state, .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px dashed var(--border);
}
.loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== MODAL ===== */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.2s ease;
}
.modal-overlay.active { display: flex; opacity: 1; }
.modal-content {
    background: var(--surface);
    border-radius: 12px;
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.95);
    transition: transform 0.2s ease;
}
.modal-overlay.active .modal-content { transform: scale(1); }

.modal-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}
.modal-header h2 { font-size: 20px; font-weight: 800; }
.modal-header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.modal-close {
    background: var(--bg);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
}
.modal-close:hover { background: var(--border); color: var(--text); }

.modal-body { padding: 24px; }
.detail-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}
.detail-item {
    background: var(--bg);
    padding: 16px;
    border-radius: var(--radius-sm);
    border-right: 3px solid var(--primary);
}
html[dir="ltr"] .detail-item { border-right: none; border-left: 3px solid var(--primary); }
.detail-item .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.detail-item .value { font-size: 18px; font-weight: 800; color: var(--text); }

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 32px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    margin-top: 48px;
}
.report-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    color: var(--text-secondary);
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border: 1px solid var(--border);
    transition: var(--transition);
}
.report-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .top-nav { padding: 0 16px; }
    .search-box input { width: 120px; }
    .gps-btn span { display: none; } /* Show only icon on mobile */
    .gps-btn { padding: 0 12px; }
    .cities-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// ===== HELPER FUNCTIONS =====
function t(key) { return translations[currentLang][key] || key; }

function getCityName(city) { return city.name[currentLang] || city.name.en; }

function updateLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('preferredLang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    
    document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.getAttribute('data-i18n')));
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = t(el.getAttribute('data-i18n-placeholder')));
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    
    if (citiesData.length > 0) displayCities(citiesData);
}

// Haversine formula to find nearest city from GPS
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth radius in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== GPS FUNCTIONALITY =====
function getUserLocation() {
    const btn = document.getElementById('gpsBtn');
    const originalText = btn.innerHTML;
    
    if (!navigator.geolocation) {
        alert("متصفحك لا يدعم تحديد الموقع الجغرافي.");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner"></i> <span>جاري التحديد...</span>';

    navigator.geolocation.getCurrentPosition(
        async (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            // Find nearest city
            let nearestCity = moroccanCities[0];
            let minDistance = Infinity;
            
            moroccanCities.forEach(city => {
                const dist = getDistance(lat, lng, city.lat, city.lng);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestCity = city;
                }
            });

            // Fetch data for the nearest city
            const data = await fetchSunData(nearestCity);
            if (data) {
                // Override name to indicate it's based on GPS
                data.name = { 
                    ar: `موقعك الحالي (قريب من ${nearestCity.name.ar})`, 
                    en: `Your Location (Near ${nearestCity.name.en})`, 
                    fr: `Votre position (Près de ${nearestCity.name.fr})` 
                };
                data.lat = lat; // Keep actual GPS coords for display
                data.lng = lng;
                
                citiesData = [data]; // Show only this result
                displayCities(citiesData);
            }
            
            btn.disabled = false;
            btn.innerHTML = originalText;
        },
        (error) => {
            alert("تعذر تحديد الموقع. يرجى التأكد من تفعيل خدمات الموقع في جهازك.");
            btn.disabled = false;
            btn.innerHTML = originalText;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}

// ===== API FETCHING =====
async function fetchSunData(city) {
    try {
        const url = `https://api.sunrisesunset.io/json?lat=${city.lat}&lng=${city.lng}`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.status === 'OK') return { ...city, ...data.results };
    } catch (error) {
        console.error(`Error fetching data for ${getCityName(city)}:`, error);
    }
    return null;
}

// ===== RENDERING =====
function createCityCard(cityData) {
    const card = document.createElement('div');
    card.className = 'city-card';
    card.onclick = () => showDetails(cityData);
    
    card.innerHTML = `
        <div class="card-header">
            <i class="fas fa-map-marker-alt"></i>
            <div>
                <h3>${getCityName(cityData)}</h3>
                <div class="coords">${cityData.lat.toFixed(4)}°, ${Math.abs(cityData.lng).toFixed(4)}°</div>
            </div>
        </div>
        <div class="times-row">
            <div class="time-box sunrise">
                <div class="label">${t('sunrise')}</div>
                <div class="value">${cityData.sunrise}</div>
            </div>
            <div class="time-box sunset">
                <div class="label">${t('sunset')}</div>
                <div class="value">${cityData.sunset}</div>
            </div>
        </div>
        <div class="card-footer">
            <div class="day-length"><i class="fas fa-hourglass-half"></i> ${cityData.day_length}</div>
            <i class="fas fa-chevron-left" style="color:var(--text-secondary); font-size:12px;"></i>
        </div>
    `;
    return card;
}

function displayCities(data) {
    const grid = document.getElementById('citiesGrid');
    grid.innerHTML = '';
    
    if (data.length === 0) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:32px; color:var(--primary); margin-bottom:12px;"></i><h3>${t('noResults')}</h3></div>`;
        return;
    }
    
    data.forEach(cityData => grid.appendChild(createCityCard(cityData)));
}

function showDetails(cityData) {
    document.getElementById('modalTitle').textContent = getCityName(cityData);
    document.getElementById('modalCoords').textContent = `${cityData.lat.toFixed(4)}°, ${Math.abs(cityData.lng).toFixed(4)}°`;
    
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-grid">
            <div class="detail-item"><div class="label"><i class="fas fa-cloud-sun"></i> ${t('dawn')}</div><div class="value">${cityData.dawn}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-sun"></i> ${t('sunrise')}</div><div class="value">${cityData.sunrise}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-sun"></i> ${t('solarNoon')}</div><div class="value">${cityData.solar_noon}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-star"></i> ${t('goldenHour')}</div><div class="value">${cityData.golden_hour}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-moon"></i> ${t('sunset')}</div><div class="value">${cityData.sunset}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-cloud-moon"></i> ${t('dusk')}</div><div class="value">${cityData.dusk}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-hourglass-half"></i> ${t('dayLength')}</div><div class="value">${cityData.day_length}</div></div>
            <div class="detail-item"><div class="label"><i class="fas fa-moon"></i> ${t('moonPhase')}</div><div class="value">${cityData.moon_phase}</div></div>
        </div>
    `;
    document.getElementById('modal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.body.style.overflow = '';
}

// ===== INITIALIZATION =====
async function loadData() {
    const promises = moroccanCities.map(city => fetchSunData(city));
    const results = await Promise.all(promises);
    citiesData = results.filter(data => data !== null);
    displayCities(citiesData);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase();
    const filtered = citiesData.filter(city => getCityName(city).toLowerCase().includes(query));
    displayCities(filtered);
});

document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
});

window.addEventListener('DOMContentLoaded', () => {
    updateLanguage(currentLang);
    loadData();
});
</script>
