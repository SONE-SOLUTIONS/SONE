<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عرض الرسائل - لحظي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f8fafc; padding: 2rem; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 1.75rem; color: #0f172a; margin-bottom: 0.25rem; }
        .sub { color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .sub span { background: #dbeafe; color: #1e40af; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 600; }
        #messagesList { display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { background: white; padding: 1rem 1.25rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-right: 4px solid #3b82f6; animation: fadeIn 0.3s ease; }
        .msg .content { font-size: 1.05rem; color: #0f172a; }
        .msg .time { font-size: 0.8rem; color: #94a3b8; margin-top: 0.3rem; }
        .empty { color: #94a3b8; text-align: center; padding: 3rem 0; font-size: 1.1rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .badge { display: inline-block; background: #3b82f6; color: white; font-size: 0.7rem; padding: 0.15rem 0.6rem; border-radius: 20px; margin-right: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>📡 الرسائل اللحظية</h1>
    <p class="sub">🟢 متصل مباشرة <span>تحديث فوري</span></p>
    <div id="messagesList">
        <div class="empty">⏳ جاري تحميل الرسائل...</div>
    </div>
</div>

<script type="module">
    // -------------------- إعداد اتصال Supabase --------------------
    const SUPABASE_URL = 'https://zpjuhprlcaigmczhqlye.supabase.co';
    // ⚠️ هام: استبدل YOUR_ANON_KEY_HERE بالمفتاح العام (Anon Key) الذي يبدأ بـ eyJ...
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';

    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const container = document.getElementById('messagesList');

    // -------------------- عرض الرسائل --------------------
    function renderMessages(messages) {
        if (!messages || messages.length === 0) {
            container.innerHTML = `<div class="empty">📭 لا توجد رسائل بعد. اكتب رسالة في لوحة التحكم!</div>`;
            return;
        }

        container.innerHTML = messages.map(msg => `
            <div class="msg">
                <div class="content">${escapeHtml(msg.content)}</div>
                <div class="time">${new Date(msg.created_at).toLocaleString('ar-EG')}</div>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // -------------------- تحميل الرسائل الحالية --------------------
    async function loadMessages() {
        const { data, error } = await supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error('خطأ في التحميل:', error);
            container.innerHTML = `<div class="empty">❌ حدث خطأ في تحميل الرسائل.</div>`;
            return;
        }

        renderMessages(data);
    }

    // -------------------- الاشتراك اللحظي (Realtime) --------------------
    function subscribeToMessages() {
        const channel = supabase
            .channel('messages-changes')
            .on(
                'postgres_changes',
                {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages'
                },
                (payload) => {
                    const newMsg = payload.new;
                    const emptyMsg = container.querySelector('.empty');

                    if (emptyMsg) {
                        loadMessages();
                        return;
                    }

                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'msg';
                    msgDiv.innerHTML = `
                        <div class="content">${escapeHtml(newMsg.content)}</div>
                        <div class="time">${new Date(newMsg.created_at).toLocaleString('ar-EG')}</div>
                    `;
                    container.prepend(msgDiv);
                }
            )
            .subscribe((status) => {
                if (status === 'SUBSCRIBED') {
                    console.log('✅ متصل بالتحديثات اللحظية');
                }
            });

        return channel;
    }

    // -------------------- تشغيل التطبيق --------------------
    await loadMessages();
    subscribeToMessages();
</script>

</body>
</html>
