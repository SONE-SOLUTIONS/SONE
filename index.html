<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول - SONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0A1408 0%, #0d2a0a 100%);
            font-family: 'Cairo', system-ui, sans-serif;
        }
        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(10, 20, 8, 0.95);
            border: 2px solid rgba(76, 175, 80, 0.4);
        }
        .btn-google:hover {
            transform: scale(1.01);
            background: #ffffff;
            color: #1f2937;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-toast { animation: fadeInUp 0.3s ease forwards; }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
            outline: none;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
            <div class="px-6 pt-8 pb-6 text-center border-b border-white/10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-600/20 rounded-2xl mb-3">
                    <i class="fas fa-leaf text-3xl text-green-400"></i>
                </div>
                <h1 class="text-3xl font-bold text-white">مرحباً بك</h1>
                <p class="text-gray-300 text-sm mt-1">سجل الدخول إلى منصة SONE</p>
            </div>
            
            <div class="p-6 space-y-5">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-200 text-sm font-medium mb-1.5">
                            <i class="fas fa-envelope ml-1 text-gray-400"></i> البريد الإلكتروني
                        </label>
                        <input type="email" id="email" required 
                               class="w-full px-4 py-3 bg-gray-800/70 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:border-green-500 input-focus transition"
                               placeholder="example@domain.com">
                    </div>
                    <div>
                        <label class="block text-gray-200 text-sm font-medium mb-1.5">
                            <i class="fas fa-key ml-1 text-gray-400"></i> كلمة المرور
                        </label>
                        <input type="password" id="password" required 
                               class="w-full px-4 py-3 bg-gray-800/70 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:border-green-500 input-focus transition"
                               placeholder="••••••••">
                    </div>
                    <button type="submit" id="signInBtn" 
                            class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-lg">
                        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                    </button>
                </form>
                
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-600/50"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-3 bg-gray-900/60 text-gray-300 rounded-full backdrop-blur-sm">أو</span>
                    </div>
                </div>
                
                <button id="googleSignInBtn" 
                        class="w-full bg-white/10 backdrop-blur-sm border border-white/20 hover:bg-white hover:text-gray-900 text-white font-semibold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-3 btn-google">
                    <i class="fab fa-google text-xl"></i> 
                    <span>تسجيل الدخول باستخدام Google</span>
                </button>
                
                <div class="text-center text-xs text-gray-400 pt-2">
                    <i class="fas fa-shield-alt ml-1"></i> بيئة آمنة ومشفرة
                </div>
            </div>
        </div>
        
        <div id="toastContainer" class="fixed bottom-5 left-5 right-5 md:left-auto md:right-5 md:w-96 z-50 flex flex-col gap-2"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://zpjuhprlcaigmczhqlye.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_PVQ61DBLGYjzaXy-XFrWpA_k_94iEvK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `glass-card rounded-xl p-4 flex items-start gap-3 shadow-xl error-toast transition-all duration-300 border-r-4 ${type === 'error' ? 'border-red-500 bg-red-900/30' : 'border-green-500 bg-green-900/30'}`;
            const icon = type === 'error' ? '<i class="fas fa-exclamation-circle text-red-400 text-lg"></i>' : '<i class="fas fa-check-circle text-green-400 text-lg"></i>';
            toast.innerHTML = `
                <div class="flex-shrink-0">${icon}</div>
                <div class="flex-1 text-sm text-white">${message}</div>
                <button class="text-gray-300 hover:text-white transition"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(toast);
            toast.querySelector('button').addEventListener('click', () => toast.remove());
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
        }
        
        async function signInWithEmail(email, password) {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                showToast(error.message || "فشل تسجيل الدخول", 'error');
                return false;
            }
            if (data?.user) {
                showToast(`مرحباً! تم تسجيل الدخول بنجاح ✅`, 'success');
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                return true;
            }
            return false;
        }
        
        async function signInWithGoogle() {
            const redirectUrl = `${window.location.origin}/dashboard.html`;
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: redirectUrl }
                });
                if (error) showToast("فشل الاتصال بـ Google: " + error.message, 'error');
            } catch (err) {
                showToast("حدث خطأ غير متوقع", 'error');
            }
        }
        
        async function checkCurrentSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showToast(`تم تسجيل الدخول مسبقاً، جاري التوجيه... 🟢`, 'success');
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showToast("الرجاء إدخال البريد الإلكتروني وكلمة المرور", 'error');
                return;
            }
            const btn = document.getElementById('signInBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            btn.disabled = true;
            await signInWithEmail(email, password);
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
        
        document.getElementById('googleSignInBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('googleSignInBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> توجيه إلى Google...';
            btn.disabled = true;
            await signInWithGoogle();
            setTimeout(() => {
                btn.innerHTML = '<i class="fab fa-google text-xl"></i> <span>تسجيل الدخول باستخدام Google</span>';
                btn.disabled = false;
            }, 2000);
        });
        
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            }
        });
        
        checkCurrentSession();
    </script>
</body>
</html>
