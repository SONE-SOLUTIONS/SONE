<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>SONE LIBRARY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0A1408;
            color: #fff;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1C2A16;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #A8842A;
            border-radius: 10px;
        }

        /* --- HEADER FIXE (NAV) --- */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 5%;
            background: rgba(10, 20, 8, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(168, 132, 66, 0.3);
            transition: all 0.3s ease;
        }
        .header.scrolled {
            padding: 8px 5%;
            background: rgba(10, 20, 8, 0.98);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* --- LOGO --- */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s;
        }
        .logo:hover {
            transform: scale(1.02);
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(168, 132, 66, 0.4);
            box-shadow: 0 0 20px rgba(168, 132, 66, 0.2);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        .logo-text h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #A8842A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .logo-text p {
            font-size: 10px;
            color: #C1DCB5;
            letter-spacing: 0.3px;
        }

        /* --- ACTIONS HEADER --- */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* --- LANG SELECTOR --- */
        .lang-selector {
            display: flex;
            gap: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid rgba(168, 132, 66, 0.25);
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
            font-family: inherit;
        }
        .lang-btn.active {
            background: #A8842A;
            color: #000;
            box-shadow: 0 2px 10px rgba(168, 132, 66, 0.3);
        }
        .lang-btn:hover:not(.active) {
            color: #fff;
            background: rgba(168, 132, 66, 0.15);
        }

        /* --- BACK BUTTON --- */
        .back-btn {
            background: rgba(168, 132, 66, 0.15);
            border: 1px solid rgba(168, 132, 66, 0.5);
            padding: 8px 18px;
            border-radius: 50px;
            color: #A8842A;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            white-space: nowrap;
        }
        .back-btn:hover {
            background: #A8842A;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(168, 132, 66, 0.3);
        }

        /* --- COVER SECTION --- */
        .header-cover {
            position: relative;
            width: 100%;
            min-height: 60vh;
            background: url('https://sone-solutions.github.io/SONE/library%20IMAGE1.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            margin-top: 0;
        }
        .header-cover::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 8, 0.65);
            backdrop-filter: blur(3px);
        }
        .header-cover .cover-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 20px;
        }
        .header-cover h1 {
            font-size: 4.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #A8842A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(168, 132, 66, 0.3);
        }
        .header-cover p {
            font-size: 1.6rem;
            color: #E0E0E0;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .header-cover .cover-btn {
            display: inline-block;
            padding: 15px 45px;
            background: linear-gradient(135deg, #A8842A, #D4A843);
            color: #000;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 5px 25px rgba(168, 132, 66, 0.4);
        }
        .header-cover .cover-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 35px rgba(168, 132, 66, 0.6);
        }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        /* --- SEARCH --- */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(168, 132, 66, 0.3);
            border-radius: 60px;
            padding: 5px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: #A8842A;
            box-shadow: 0 0 20px rgba(168, 132, 66, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .search-box input {
            flex: 1;
            padding: 14px 20px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }
        .search-box input::placeholder {
            color: #7f8c8d;
        }
        .search-box .search-icon {
            padding: 12px 18px;
            color: #A8842A;
            font-size: 18px;
        }
        .search-box .clear-btn {
            padding: 12px 18px;
            color: #7f8c8d;
            cursor: pointer;
            font-size: 18px;
            display: none;
            transition: 0.3s;
        }
        .search-box .clear-btn:hover {
            color: #f44336;
            transform: scale(1.2);
        }
        .search-box .search-count {
            padding: 8px 15px;
            color: #C1DCB5;
            font-size: 13px;
            background: rgba(168, 132, 66, 0.15);
            border-radius: 30px;
            display: none;
            white-space: nowrap;
        }

        .search-results-info {
            text-align: center;
            color: #C1DCB5;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .search-results-info .highlight {
            color: #A8842A;
            font-weight: bold;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 132, 66, 0.3);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-family: inherit;
        }
        .tab-btn.active,
        .tab-btn:hover {
            background: #A8842A;
            color: #000;
            border-color: #A8842A;
            transform: translateY(-2px);
        }
        .content-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .content-panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- GRID --- */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .library-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(168, 132, 66, 0.2);
            transition: all 0.4s;
            display: flex;
            gap: 18px;
            position: relative;
            overflow: hidden;
        }
        .library-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #A8842A, #D4A843);
            transform: scaleY(0);
            transition: transform 0.3s;
        }
        .library-card:hover::before {
            transform: scaleY(1);
        }
        .library-card:hover {
            transform: translateY(-5px);
            border-color: #A8842A;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(168, 132, 66, 0.2), rgba(168, 132, 66, 0.05));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid rgba(168, 132, 66, 0.2);
            position: relative;
        }
        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-icon .file-icon {
            font-size: 45px;
            color: #A8842A;
        }
        .card-icon .pdf-loading {
            font-size: 30px;
            color: #A8842A;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .card-info {
            flex: 1;
        }
        .card-info h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .card-info p {
            font-size: 13px;
            color: #C1DCB5;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 11px;
            color: #A8842A;
            flex-wrap: wrap;
        }
        .card-meta .file-badge {
            background: rgba(168, 132, 66, 0.2);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            color: #C1DCB5;
        }
        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #C1DCB5;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:hover {
            background: rgba(168, 132, 66, 0.3);
            color: #A8842A;
            transform: scale(1.1);
        }

        .empty-library {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            border: 1px dashed rgba(168, 132, 66, 0.3);
            grid-column: 1/-1;
        }
        .empty-library i {
            font-size: 70px;
            margin-bottom: 20px;
            color: #A8842A;
            opacity: 0.5;
        }
        .empty-library h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .empty-library p {
            color: #C1DCB5;
            margin-bottom: 25px;
        }

        /* --- FOOTER --- */
        .footer {
            background: rgba(10, 20, 8, 0.95);
            padding: 40px 5% 20px;
            border-top: 1px solid rgba(168, 132, 66, 0.2);
            text-align: center;
            margin-top: 60px;
        }
        .footer p {
            color: #C1DCB5;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .footer .report-btn {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(168, 132, 66, 0.15);
            border: 1px solid rgba(168, 132, 66, 0.5);
            border-radius: 50px;
            color: #A8842A;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }
        .footer .report-btn:hover {
            background: #A8842A;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(168, 132, 66, 0.3);
        }

        /* --- MODAL --- */
        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        .detail-modal.active {
            display: flex;
        }
        .detail-content {
            background: #1C2A16;
            border-radius: 32px;
            padding: 30px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #A8842A;
        }
        .close-detail {
            background: #A8842A;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .detail-section {
            margin: 12px 0;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
        }
        .detail-header {
            text-align: center;
            margin-bottom: 15px;
        }
        .detail-header h2 {
            color: #A8842A;
            font-size: 22px;
        }
        .detail-file-preview {
            max-width: 100%;
            border-radius: 12px;
            margin: 10px 0;
            max-height: 500px;
            object-fit: contain;
        }
        .file-embed-pdf {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 12px;
        }
        .file-embed-text {
            width: 100%;
            max-height: 400px;
            overflow-y: auto;
            background: #0F1E0C;
            padding: 15px;
            border-radius: 12px;
            color: #C1DCB5;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn-group .btn-action {
            flex: 1;
            min-width: 120px;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }
        .btn-group .btn-open {
            background: linear-gradient(135deg, #A8842A, #C49B3A);
            color: #000;
        }
        .btn-group .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 132, 66, 0.3);
        }
        .btn-group .btn-download {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(168, 132, 66, 0.3);
        }
        .btn-group .btn-download:hover {
            background: rgba(168, 132, 66, 0.2);
        }

        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 3000;
            display: none;
            font-size: 13px;
            font-family: 'Cairo', sans-serif;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .header-cover {
                min-height: 50vh;
            }
            .header-cover h1 {
                font-size: 2.8rem;
            }
            .header-cover p {
                font-size: 1.2rem;
            }
            .header-content {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .header-actions {
                justify-content: center;
            }
            .logo {
                justify-content: center;
            }
            .back-btn {
                justify-content: center;
            }
            .lang-selector {
                justify-content: center;
            }
            .container {
                padding-top: 20px;
            }
            .library-card {
                flex-direction: column;
                text-align: center;
            }
            .card-icon {
                margin: 0 auto;
                width: 80px;
                height: 80px;
            }
            .card-actions {
                flex-direction: row;
                justify-content: center;
                margin-top: 10px;
            }
            .file-embed-pdf {
                height: 350px;
            }
            .search-box input {
                font-size: 14px;
                padding: 10px 15px;
            }
            .search-box .search-count {
                font-size: 11px;
                padding: 5px 10px;
            }
            .logo-icon {
                width: 40px;
                height: 40px;
            }
            .logo-text h1 {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .header-cover h1 {
                font-size: 2rem;
            }
            .header-cover p {
                font-size: 1rem;
            }
            .lang-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            .back-btn {
                font-size: 12px;
                padding: 6px 12px;
            }
            .logo-icon {
                width: 35px;
                height: 35px;
            }
            .logo-text h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- HEADER FIXE (NAV)                                             -->
    <!-- ============================================================ -->
    <header class="header" id="header">
        <div class="header-content">
            <!-- LOGO -->
            <a href="library.html" class="logo">
                <div class="logo-icon">
                    <img src="https://sone-solutions.github.io/SONE/SONELOGE.jpg" alt="SONE LIBRARY Logo" />
                </div>
                <div class="logo-text">
                    <h1>SONE LIBRARY</h1>
                    <p data-i18n="subtitle">المنصة المتكاملة للفلاحة الذكية</p>
                </div>
            </a>

            <!-- ACTIONS -->
            <div class="header-actions">
                <!-- Langues -->
                <div class="lang-selector">
                    <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')">عربي</button>
                    <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
                    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
                </div>
                <!-- Retour -->
                <a href="https://sone-solutions.github.io/SONE/service.html" class="back-btn">
                    <i class="fas fa-arrow-right"></i>
                    <span data-i18n="back">العودة للرئيسية</span>
                </a>
            </div>
        </div>
    </header>

    <!-- ============================================================ -->
    <!-- COVER SECTION                                                 -->
    <!-- ============================================================ -->
    <section class="header-cover">
        <div class="cover-content" data-aos="fade-up">
            <h1 data-i18n="coverTitle">SONE LIBRARY</h1>
            <p data-i18n="coverDesc">La connaissance au service de l’agriculture</p>
            <a href="#library-content" class="cover-btn" data-i18n="coverBtn">Explorez, apprenez, partagez</a>
        </div>
    </section>

    <!-- ============================================================ -->
    <!-- MAIN CONTENT                                                  -->
    <!-- ============================================================ -->
    <div class="container" id="library-content">

        <!-- Recherche -->
        <div class="search-container" data-aos="fade-up" data-aos-delay="150">
            <div class="search-box">
                <span class="search-icon"><i class="fas fa-search"></i></span>
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن أي شيء (عنوان، وصف، نوع، اسم ملف...)" oninput="handleSearch(this.value)" />
                <span class="clear-btn" id="clearSearchBtn" onclick="clearSearch()"><i class="fas fa-times-circle"></i></span>
                <span class="search-count" id="searchCount">0 résultat</span>
            </div>
        </div>

        <!-- Infos résultats -->
        <div class="search-results-info" id="searchResultsInfo">
            <span data-i18n="showing">عرض</span>
            <span class="highlight" id="resultCount">0</span>
            <span data-i18n="of">من</span>
            <span class="highlight" id="totalCountDisplay">0</span>
        </div>

        <!-- Onglets -->

        // ============================================================

        // ============================================================
        async function fetchLibraryItems() {
            const url = `${SUPABASE_URL}/rest/v1/library_items?select=*`;
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'apikey': API_KEY,
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Échec du chargement : ${response.status} - ${errorText}`);
            }
            return await response.json();
        }

        function isPDFFile(fileName) {
            if (!fileName) return false;
            const ext = fileName.split('.').pop().toLowerCase();
            return ext === 'pdf';
        }

        function isImageFile(fileName) {
            if (!fileName) return false;
            const ext = fileName.split('.').pop().toLowerCase();
            return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico'].includes(ext);
        }

        function isTextFile(fileName) {
            if (!fileName) return false;
            const ext = fileName.split('.').pop().toLowerCase();
            return ['txt', 'md', 'csv', 'log', 'json', 'xml', 'html', 'css', 'js'].includes(ext);
        }

        function getFileIcon(fileName) {
            if (!fileName) return '📄';
            const ext = fileName.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📄',
                ppt: '📊',
                pptx: '📊',
                mp4: '🎥',
                mov: '🎥',
                avi: '🎥',
                mkv: '🎥',
                doc: '📝',
                docx: '📝',
                xls: '📊',
                xlsx: '📊',
                zip: '📦',
                rar: '📦',
                txt: '📃',
                md: '📃'
            };
            return icons[ext] || '📄';
        }

        async function extractPDFCover(pdfUrl) {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                const scale = 1.5;
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const renderContext = { viewport, canvasContext: context };
                await page.render(renderContext).promise;
                return canvas.toDataURL('image/jpeg', 0.8);
            } catch (error) {
                console.error('❌ PDF cover error:', error);
                return null;
            }
        }

        function renderGrid(gridId, items, type) {
            const grid = document.getElementById(gridId);
            if (!grid) return;

            const emptyMessages = {
                book: { icon: '📚', titleKey: 'emptyBooks', msgKey: 'addBooks' },
                article: { icon: '📄', titleKey: 'emptyArticles', msgKey: 'addArticles' },
                video: { icon: '🎥', titleKey: 'emptyVideos', msgKey: 'addVideos' },
                report: { icon: '📊', titleKey: 'emptyReports', msgKey: 'addReports' },
                training: { icon: '🎓', titleKey: 'emptyTrainings', msgKey: 'addTrainings' }
            };

            if (items.length === 0) {
                const info = emptyMessages[type] || { icon: '📦', titleKey: 'emptyBooks', msgKey: 'addBooks' };
                const title = translations[currentLang][info.titleKey] || info.titleKey;
                const msg = translations[currentLang][info.msgKey] || info.msgKey;
                grid.innerHTML = `
                    <div class="empty-library">
                        <i class="fas ${info.icon}"></i>
                        <h3>${title}</h3>
                        <p>${msg}</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = items.map(item => {
                let iconHtml = '';
                if (item.file_url && isPDFFile(item.file_name)) {
                    iconHtml = `<span class="pdf-loading"><i class="fas fa-spinner"></i></span>`;
                } else if (item.file_url && isImageFile(item.file_name)) {
                    iconHtml =
                        `<img src="${item.file_url}" alt="${item.title}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'file-icon\\'>🖼️</span>';">`;
                } else if (item.file_url) {
                    iconHtml = `<span class="file-icon">${getFileIcon(item.file_name)}</span>`;
                } else if (item.video_url) {
                    iconHtml = `<span class="file-icon">🎥</span>`;
                } else {
                    const typeIcons = { book: '📖', article: '📄', video: '🎬', report: '📈', training: '📊' };
                    iconHtml = `<span class="file-icon">${item.icon || typeIcons[type] || '📄'}</span>`;
                }

                const fileNameDisplay = item.file_name ?
                    (item.file_name.length > 20 ? item.file_name.substring(0, 20) + '...' : item.file_name) : '';

                return `
                    <div class="library-card" data-id="${item.id}" data-pdfurl="${item.file_url || ''}" data-filename="${item.file_name || ''}">
                        <div class="card-icon" id="icon-${item.id}">${iconHtml}</div>
                        <div class="card-info">
                            <h4>${escapeHtml(item.title)}</h4>
                            <p>${escapeHtml((item.description || '').substring(0, 80))}...</p>
                            <div class="card-meta">
                                <span><i class="fas fa-calendar-alt"></i> ${formatDate(item.date)}</span>
                                ${item.file_name ? `<span class="file-badge"><i class="fas fa-paperclip"></i> ${escapeHtml(fileNameDisplay)}</span>` : ''}
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="viewItem(${item.id}, '${type}')" title="${translations[currentLang].viewDetails || 'Voir détails'}"><i class="fas fa-eye"></i></button>
                            ${item.file_url ? `<a href="${item.file_url}" target="_blank" class="action-btn" style="text-decoration:none;" title="Ouvrir"><i class="fas fa-external-link-alt"></i></a>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll(`#${gridId} .library-card`).forEach(async (card) => {
                const pdfUrl = card.dataset.pdfurl;
                const fileName = card.dataset.filename;
                const id = card.dataset.id;
                if (pdfUrl && isPDFFile(fileName)) {
                    const iconContainer = document.getElementById(`icon-${id}`);
                    if (iconContainer) {
                        const cover = await extractPDFCover(pdfUrl);
                        if (cover) {
                            iconContainer.innerHTML = `<img src="${cover}" alt="Couverture PDF">`;
                        } else {
                            iconContainer.innerHTML = `<span class="file-icon">📄</span>`;
                        }
                    }
                }
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'Date inconnue';
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR');
        }

        function renderAll() {
            const books = allItems.filter(i => i.type === 'book');
            const articles = allItems.filter(i => i.type === 'article');
            const videos = allItems.filter(i => i.type === 'video');
            const reports = allItems.filter(i => i.type === 'report');
            const trainings = allItems.filter(i => i.type === 'training');

            renderGrid('booksGrid', books, 'book');
            renderGrid('articlesGrid', articles, 'article');
            renderGrid('videosGrid', videos, 'video');
            renderGrid('reportsGrid', reports, 'report');
            renderGrid('trainingsGrid', trainings, 'training');

            updateSearchInfo();
        }

        // ============================================================
        // 5. Recherche
        // ============================================================
        function handleSearch(term) {
            currentSearchTerm = term.trim().toLowerCase();
            const clearBtn = document.getElementById('clearSearchBtn');
            const searchCount = document.getElementById('searchCount');

            if (currentSearchTerm) {
                clearBtn.style.display = 'inline-block';
            } else {
                clearBtn.style.display = 'none';
            }

            if (!currentSearchTerm) {
                renderAll();
                searchCount.style.display = 'none';
                document.getElementById('searchResultsInfo').style.display = 'none';
                return;
            }

            const filtered = allItems.filter(item => {
                const searchIn = [
                    item.title,
                    item.description,
                    item.type,
                    item.file_name,
                    item.icon
                ].filter(Boolean).map(field => field.toLowerCase());
                return searchIn.some(field => field.includes(currentSearchTerm));
            });

            const types = ['book', 'article', 'video', 'report', 'training'];
            const gridIds = ['booksGrid', 'articlesGrid', 'videosGrid', 'reportsGrid', 'trainingsGrid'];

            types.forEach((type, index) => {
                const filteredItems = filtered.filter(i => i.type === type);
                renderGrid(gridIds[index], filteredItems, type);
            });

            searchCount.style.display = 'inline-block';
            searchCount.textContent = `${filtered.length} résultat${filtered.length > 1 ? 's' : ''}`;
            document.getElementById('searchResultsInfo').style.display = 'block';
            document.getElementById('resultCount').textContent = filtered.length;
            document.getElementById('totalCountDisplay').textContent = allItems.length;

            if (filtered.length === 0) {
                const noResMsg = translations[currentLang].noResults || 'Aucun résultat';
                ['booksGrid', 'articlesGrid', 'videosGrid', 'reportsGrid', 'trainingsGrid'].forEach(id => {
                    const grid = document.getElementById(id);
                    if (grid && grid.children.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-library" style="border-color:rgba(168,132,66,0.3);">
                                <i class="fas fa-search" style="color:#A8842A; opacity:0.5;"></i>
                                <h3>🔍 ${noResMsg}</h3>
                                <p style="color:#C1DCB5;">"<strong style="color:#A8842A;">${escapeHtml(currentSearchTerm)}</strong>"</p>
                            </div>
                        `;
                    }
                });
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearchBtn').style.display = 'none';
            document.getElementById('searchCount').style.display = 'none';
            document.getElementById('searchResultsInfo').style.display = 'none';
            currentSearchTerm = '';
            renderAll();
        }

        function updateSearchInfo() {
            if (currentSearchTerm) {
                const filtered = allItems.filter(item => {
                    const searchIn = [
                        item.title,
                        item.description,
                        item.type,
                        item.file_name,
                        item.icon
                    ].filter(Boolean).map(field => field.toLowerCase());
                    return searchIn.some(field => field.includes(currentSearchTerm));
                });
                document.getElementById('searchCount').textContent = `${filtered.length} résultat${filtered.length > 1 ? 's' : ''}`;
                document.getElementById('resultCount').textContent = filtered.length;
                document.getElementById('totalCountDisplay').textContent = allItems.length;
            }
        }

        // ============================================================
        // 6. Détails
        // ============================================================
        async function viewItem(id, type) {
            const item = allItems.find(i => i.id === id && i.type === type);
            if (!item) {
                showToast('⚠️ Élément introuvable', 'error');
                return;
            }

            const lang = currentLang;
            const t = translations[lang];

            let html = `<div class="detail-header"><h2>${escapeHtml(item.title)}</h2></div>`;

            let previewHtml = '';

            if (item.file_url && isPDFFile(item.file_name)) {
                previewHtml = `
                    <div class="detail-section">
                        <iframe src="${item.file_url}" class="file-embed-pdf" allowfullscreen></iframe>
                    </div>
                `;
            } else if (item.file_url && isImageFile(item.file_name)) {
                previewHtml = `
                    <div class="detail-section" style="text-align:center;">
                        <img src="${item.file_url}" alt="${item.title}" class="detail-file-preview"
                             onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\\'font-size:80px;color:#666;\\'>🖼️</span><br><span style=\\'color:#C1DCB5;\\'>${item.file_name || 'Image'}</span>';">
                    </div>
                `;
            } else if (item.file_url && isTextFile(item.file_name)) {
                previewHtml = `
                    <div class="detail-section" id="textContentContainer">
                        <div style="text-align:center;padding:20px;color:#C1DCB5;">
                            <i class="fas fa-spinner fa-spin"></i> ${t.loading || 'Chargement...'}
                        </div>
                    </div>
                `;
                setTimeout(async () => {
                    try {
                        const resp = await fetch(item.file_url);
                        if (!resp.ok) throw new Error('Erreur');
                        const text = await resp.text();
                        const container = document.getElementById('textContentContainer');
                        if (container) {
                            container.innerHTML = `
                                <div class="file-embed-text">${escapeHtml(text)}</div>
                                <div style="margin-top:8px;font-size:12px;color:#888;">📄 ${item.file_name}</div>
                            `;
                        }
                    } catch (err) {
                        const container = document.getElementById('textContentContainer');
                        if (container) {
                            container.innerHTML = `<div style="color:#f44336;">${t.errorLoading || '⚠️ Erreur'}</div>`;
                        }
                    }
                }, 100);
            } else if (item.file_url) {
                const fileIcon = getFileIcon(item.file_name);
                previewHtml = `
                    <div class="detail-section" style="text-align:center;font-size:60px;padding:30px;">
                        ${fileIcon}
                        <br><span style="font-size:14px;color:#C1DCB5;">${item.file_name || 'Fichier'}</span>
                    </div>
                `;
            } else if (item.video_url) {
                previewHtml = `
                    <div class="detail-section">
                        <iframe width="100%" height="280" src="${item.video_url}" frameborder="0" allowfullscreen></iframe>
                    </div>
                `;
            }

            html += previewHtml;

            html += `
                <div class="detail-section">
                    <p><strong>📝 ${t.description || 'Description'} :</strong> ${item.description || t.noDesc || 'Aucune'}</p>
                </div>
                <div class="detail-section">
                    <p><strong>📅 ${t.date || 'Date'} :</strong> ${formatDate(item.date)}</p>
                    ${item.file_name ? `<p><strong>📎 ${t.fileName || 'Fichier'} :</strong> ${item.file_name}</p>` : ''}
                </div>
            `;

            if (item.file_url) {
                html += `
                    <div class="btn-group">
                        <a href="${item.file_url}" target="_blank" class="btn-action btn-open">
                            <i class="fas fa-external-link-alt"></i> ${t.openRead || 'Ouvrir'}
                        </a>
                        <a href="${item.file_url}" download class="btn-action btn-download">
                            <i class="fas fa-download"></i> ${t.download || 'Télécharger'}
                        </a>
                    </div>
                `;
            }

            html += `<button class="close-detail" onclick="closeDetailModal()">✖ ${t.close || 'Fermer'}</button>`;

            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.style.background = type === 'success' ? '#4CAF50' : (type === 'error' ? '#f44336' : '#2196f3');
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle')}"></i> ${msg}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        // ============================================================
        // 7. Événements
        // ============================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.content-panel').forEach(panel => panel.classList.remove('active'));
                document.getElementById(`${btn.dataset.tab}-panel`).classList.add('active');
            });
        });

        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeDetailModal();
        });

        // ============================================================
        // 8. Chargement initial
        // ============================================================
        async function loadData() {
            try {
                allItems = await fetchLibraryItems();
                renderAll();
                setLang('ar');
            } catch (error) {
                console.error('❌ Erreur:', error);
                showToast('❌ ' + error.message, 'error');
                ['booksGrid', 'articlesGrid', 'videosGrid', 'reportsGrid', 'trainingsGrid'].forEach(id => {
                    const grid = document.getElementById(id);
                    if (grid) {
                        grid.innerHTML = `
                            <div class="empty-library" style="border-color:#f44336;">
                                <i class="fas fa-exclamation-triangle" style="color:#f44336;"></i>
                                <h3 style="color:#f44336;">⚠️ Erreur de chargement</h3>
                                <p style="color:#C1DCB5;">${error.message}</p>
                                <button onclick="loadData()" style="margin-top:15px;padding:10px 25px;background:#A8842A;border:none;border-radius:30px;color:#000;font-weight:bold;cursor:pointer;">Réessayer</button>
                            </div>
                        `;
                    }
                });
            }
        }

        loadData();

        console.log('📚 SONE LIBRARY - Multilingue (FR/AR/EN)');
    </script>
</body>
</html>
