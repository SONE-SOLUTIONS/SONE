<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign In - SONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0A1408 0%, #1A2A14 50%, #0F1E0C 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(168, 132, 66, 0.25);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .glass-card:hover {
            border-color: rgba(168, 132, 66, 0.4);
            box-shadow: 0 30px 60px rgba(168, 132, 66, 0.1);
        }
        .btn-google:hover {
            transform: scale(1.02);
            background: #ffffff;
            color: #1f2937;
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(168, 132, 66, 0.3);
        }
        .error-toast {
            animation: fadeInUp 0.3s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(168, 132, 66, 0.4);
            box-shadow: 0 0 30px rgba(168, 132, 66, 0.2);
            transition: all 0.3s;
        }
        .logo-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(168, 132, 66, 0.4);
        }
        .gold-text {
            background: linear-gradient(135deg, #A8842A, #D4A843, #C49B3A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(168, 132, 66, 0.2);
            transition: all 0.3s;
            color: #fff;
        }
        .input-field:focus {
            border-color: #A8842A;
            box-shadow: 0 0 0 3px rgba(168, 132, 66, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .btn-login {
            background: linear-gradient(135deg, #A8842A, #C49B3A);
            color: #000;
            font-weight: 700;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #C49B3A, #D4A843);
            color: #000;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl transition-all duration-500">
            <!-- Header with Logo -->
            <div class="px-6 pt-8 pb-6 text-center border-b border-white/10">
                <div class="flex flex-col items-center">
                    <!-- Logo -->
                    <img src="https://scontent.frba1-4.fna.fbcdn.net/v/t39.30808-6/681884209_122093720763301010_4741601618872924151_n.jpg?stp=dst-jpg_tt6&cstp=mx1448x1086&ctp=s1448x1086&_nc_cat=105&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeHxluZ2hQ1jX0BWnXknNpa0vNxkRJHUvNK83GREkdS80v2iGDQGg09nRpOJIyBvRZqewR8ANuZxnglu_3jyBLRP&_nc_ohc=9r2RteZWbQ0Q7kNvwHWwKA8&_nc_oc=AdojtAecjs5SQTGQz_vjLo4Wh6aoO70oew0NwL5JzESrNs9ZnooWSHxGilkU8inj8oY&_nc_zt=23&_nc_ht=scontent.frba1-4.fna&_nc_gid=8_zLhe5o4Z5vPSzY0tOMbQ&_nc_ss=7e2a8&oh=00_Af_Hia-_ebmuBNhwwPzob_74-4oE6AjO8RnlafM2Jxkz8Q&oe=6A3FB926" 
                         alt="SONE Logo" 
                         class="logo-img mb-3">
                    
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-[#A8842A]/20 to-[#D4A843]/10 rounded-2xl mb-2">
                        <i class="fas fa-lock text-3xl text-[#A8842A]"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Welcome Back</h1>
                    <p class="text-gray-400 text-sm mt-1">Sign in to access your <span class="gold-text font-bold">SONE</span> account</p>
                </div>
            </div>
            
            <div class="p-6 space-y-5">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-gray-300 text-sm font-medium mb-1.5">
                            <i class="fas fa-envelope ml-1 text-[#A8842A]"></i> Email Address
                        </label>
                        <input type="email" id="email" required 
                               class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-400 focus:border-[#A8842A] focus:outline-none focus:ring-2 focus:ring-[#A8842A]/30 transition input-field"
                               placeholder="example@domain.com">
                    </div>
                    <div>
                        <label class="block text-gray-300 text-sm font-medium mb-1.5">
                            <i class="fas fa-key ml-1 text-[#A8842A]"></i> Password
                        </label>
                        <input type="password" id="password" required 
                               class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-400 focus:border-[#A8842A] focus:outline-none focus:ring-2 focus:ring-[#A8842A]/30 transition input-field"
                               placeholder="••••••••">
                    </div>
                    <button type="submit" id="signInBtn" 
                            class="w-full btn-login text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-lg">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-700/50"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-3 bg-gray-900/60 text-gray-400 rounded-full backdrop-blur-sm">or</span>
                    </div>
                </div>
                
                <button id="googleSignInBtn" 
                        class="w-full bg-white/10 backdrop-blur-sm border border-white/20 hover:bg-white hover:text-gray-900 text-white font-semibold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-3 btn-google">
                    <i class="fab fa-google text-xl"></i> 
                    <span>Sign in with Google</span>
                </button>
                
                <div class="text-center text-xs text-gray-500 pt-2 flex items-center justify-center gap-2">
                    <i class="fas fa-shield-alt text-[#A8842A]"></i>
                    <span>Secure &amp; Encrypted</span>
                </div>
            </div>
        </div>
        
        <div id="toastContainer" class="fixed bottom-5 left-5 right-5 md:left-auto md:right-5 md:w-96 z-50 flex flex-col gap-2"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://zpjuhprlcaigmczhqlye.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_PVQ61DBLGYjzaXy-XFrWpA_k_94iEvK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ✅ Redirect URL after login (directly to service.html)
        const REDIRECT_URL = "https://sone-solutions.github.io/SONE/service.html";
        
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `glass-card rounded-xl p-4 flex items-start gap-3 shadow-xl error-toast transition-all duration-300 border-r-4 ${type === 'error' ? 'border-red-500 bg-red-900/30' : 'border-green-500 bg-green-900/30'}`;
            const icon = type === 'error' ? '<i class="fas fa-exclamation-circle text-red-400 text-lg"></i>' : '<i class="fas fa-check-circle text-green-400 text-lg"></i>';
            toast.innerHTML = `
                <div class="flex-shrink-0">${icon}</div>
                <div class="flex-1 text-sm text-white">${message}</div>
                <button class="text-gray-300 hover:text-white transition"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(toast);
            
            const closeBtn = toast.querySelector('button');
            closeBtn.addEventListener('click', () => toast.remove());
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 5000);
        }
        
        // 🔹 Sign in with Email & Password
        async function signInWithEmail(email, password) {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                showToast(error.message || "Login failed", 'error');
                return false;
            }
            if (data?.user) {
                showToast(`Welcome ${data.user.email}! Login successful ✅`, 'success');
                // ✅ Redirect to service.html
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 1500);
                return true;
            }
            return false;
        }
        
        // 🔹 Sign in with Google
        async function signInWithGoogle() {
            // ✅ Use redirect URL directly to service.html
            const redirectUrl = REDIRECT_URL;
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { 
                        redirectTo: redirectUrl,
                        queryParams: {
                            access_type: 'offline',
                            prompt: 'consent',
                        }
                    }
                });
                if (error) {
                    if (error.message.includes("redirect_uri_mismatch")) {
                        showToast("Error: Please add the redirect URL in Google Cloud Console", 'error');
                    } else {
                        showToast("Google sign-in failed: " + error.message, 'error');
                    }
                }
            } catch (err) {
                showToast("An unexpected error occurred", 'error');
            }
        }
        
        // 🔹 Check current session
        async function checkCurrentSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                // ✅ If already signed in, redirect to service.html
                window.location.href = REDIRECT_URL;
            }
        }
        
        function addLogoutOption(userEmail) {
            const cardHeader = document.querySelector('.glass-card .border-b');
            if (cardHeader && !document.getElementById('customLogoutBtn')) {
                const logoutDiv = document.createElement('div');
                logoutDiv.id = 'customLogoutBtn';
                logoutDiv.className = 'mt-2 text-center pb-1';
                logoutDiv.innerHTML = `
                    <button id="logoutAction" class="text-xs bg-red-500/20 hover:bg-red-500/40 text-red-200 px-4 py-1.5 rounded-full transition flex items-center gap-1 mx-auto">
                        <i class="fas fa-sign-out-alt"></i> Sign Out (${userEmail})
                    </button>
                `;
                cardHeader.parentNode.insertBefore(logoutDiv, cardHeader.nextSibling);
                document.getElementById('logoutAction').addEventListener('click', async () => {
                    await supabaseClient.auth.signOut();
                    showToast("Signed out successfully", 'success');
                    setTimeout(() => window.location.reload(), 1000);
                });
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showToast("Please enter your email and password", 'error');
                return;
            }
            const btn = document.getElementById('signInBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;
            await signInWithEmail(email, password);
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
        
        document.getElementById('googleSignInBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('googleSignInBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Redirecting to Google...';
            btn.disabled = true;
            await signInWithGoogle();
            setTimeout(() => {
                btn.innerHTML = '<i class="fab fa-google text-xl"></i> <span>Sign in with Google</span>';
                btn.disabled = false;
            }, 2000);
        });
        
        checkCurrentSession();
        
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                showToast(`Login successful! Redirecting...`, 'success');
                setTimeout(() => {
                    window.location.href = REDIRECT_URL;
                }, 1500);
                if (!document.getElementById('customLogoutBtn')) addLogoutOption(session.user.email);
            }
        });
        
        console.log("✅ Supabase connected successfully");
        console.log("🔐 Redirect URL:", REDIRECT_URL);
    </script>
</body>
</html>
